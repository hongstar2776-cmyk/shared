<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>일위대가 검색</title>
    
    <!-- Tailwind CSS (UI 디자인) -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel (브라우저에서 JSX 컴파일) -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- PapaParse (CSV 파일 초고속 파싱) -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    
    <!-- Dexie.js (브라우저 내장 IndexedDB를 쉽게 사용하기 위한 라이브러리) -->
    <script src="https://unpkg.com/dexie@3.2.4/dist/dexie.js"></script>

    <!-- Firebase SDK (사용자가 요청한 설정) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-analytics.js";

        const firebaseConfig = {
            apiKey: "AIzaSyBhY5W3WxnSscZjVaXE-dP8NEhmElSirnc",
            authDomain: "labor-yejo-20260306.firebaseapp.com",
            projectId: "labor-yejo-20260306",
            storageBucket: "labor-yejo-20260306.firebasestorage.app",
            messagingSenderId: "1063955788001",
            appId: "1:1063955788001:web:401e863f4bce218c3787a0",
            measurementId: "G-32WLRXQJJG"
        };

        // Firebase 초기화
        const app = initializeApp(firebaseConfig);
        const analytics = getAnalytics(app);
        window.firebaseApp = app; 
    </script>

    <style>
        /* 커스텀 스크롤바 */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .table-container { max-height: calc(100vh - 300px); overflow-y: auto; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // 브라우저 내장 데이터베이스(IndexedDB) 설정
        const db = new Dexie("ConstructionCostDB");
        // DB 버전을 올려 구조 변경을 반영
        db.version(3).stores({
            unitPriceList: '++id, code, searchIndex', // 일위대가목록 (검색 인덱스 포함)
            unitPriceDetail: '++id, parentCode'       // 일위대가 상세 (N열 코드로 빠른 연결)
        });

        function App() {
            const [activeTab, setActiveTab] = useState('search');
            const [isDbReady, setIsDbReady] = useState(false);
            const [loadingMessage, setLoadingMessage] = useState('');
            
            // 검색 관련 상태
            const [keyword, setKeyword] = useState('');
            const [searchResults, setSearchResults] = useState([]);
            const [selectedItem, setSelectedItem] = useState(null);
            const [relatedDetails, setRelatedDetails] = useState([]);
            const [isSearching, setIsSearching] = useState(false);

            // 좌우 패널 크기 조절을 위한 상태 및 Ref 추가
            const [leftSplit, setLeftSplit] = useState(50); // 초기 패널 너비 비율 (50%)
            const splitContainerRef = useRef(null);
            const isDraggingSplit = useRef(false);

            // 키보드 이동 시 자동 스크롤을 위한 참조
            const selectedRowRef = useRef(null);

            // 좌우 패널 크기 조절 드래그 핸들러
            const handleSplitMouseDown = (e) => {
                e.preventDefault();
                isDraggingSplit.current = true;
                document.body.style.cursor = 'col-resize';
                document.body.style.userSelect = 'none'; // 드래그 중 텍스트 선택 방지
                
                const handleSplitMouseMove = (moveEvent) => {
                    if (!isDraggingSplit.current || !splitContainerRef.current) return;
                    const containerRect = splitContainerRef.current.getBoundingClientRect();
                    // 마우스 위치를 기반으로 백분율 계산
                    let newSplit = ((moveEvent.clientX - containerRect.left) / containerRect.width) * 100;
                    // 최소 20%, 최대 80%로 제한
                    if (newSplit < 20) newSplit = 20;
                    if (newSplit > 80) newSplit = 80;
                    setLeftSplit(newSplit);
                };

                const handleSplitMouseUp = () => {
                    isDraggingSplit.current = false;
                    document.body.style.cursor = 'default';
                    document.body.style.userSelect = '';
                    document.removeEventListener('mousemove', handleSplitMouseMove);
                    document.removeEventListener('mouseup', handleSplitMouseUp);
                };

                document.addEventListener('mousemove', handleSplitMouseMove);
                document.addEventListener('mouseup', handleSplitMouseUp);
            };

            // 숫자 콤마 표시 유틸리티 함수
            const formatNumber = (val) => {
                if (!val) return '0';
                const num = Number(val.toString().replace(/,/g, ''));
                if (isNaN(num)) return val;
                return num.toLocaleString('ko-KR');
            };

            // 문자열을 숫자로 변환하는 유틸리티 함수 (합계 계산용)
            const parseNumber = (val) => {
                if (!val) return 0;
                const num = Number(val.toString().replace(/,/g, ''));
                return isNaN(num) ? 0 : num;
            };

            // 하위 상세 내역 합계 계산
            const detailTotals = useMemo(() => {
                let mat = 0, lab = 0, exp = 0, tot = 0;
                relatedDetails.forEach(det => {
                    mat += parseNumber(det.matAmt);
                    lab += parseNumber(det.labAmt);
                    exp += parseNumber(det.expAmt);
                    tot += parseNumber(det.totAmt);
                });
                return { mat, lab, exp, tot };
            }, [relatedDetails]);

            // 현재 검색된 목록의 합계금액 통계 계산 (추가된 부분)
            const searchStats = useMemo(() => {
                if (searchResults.length === 0) return { avg: 0, mode: 0, min: 0, max: 0 };
                
                const totals = searchResults.map(item => parseNumber(item.total));
                const sum = totals.reduce((a, b) => a + b, 0);
                const avg = Math.round(sum / totals.length);
                const min = Math.min(...totals);
                const max = Math.max(...totals);
                
                // 최빈값 계산
                const counts = {};
                let maxCount = 0;
                let mode = totals[0];
                for (const num of totals) {
                    counts[num] = (counts[num] || 0) + 1;
                    if (counts[num] > maxCount) {
                        maxCount = counts[num];
                        mode = num;
                    }
                }

                return { avg, mode, min, max };
            }, [searchResults]);

            // 열 너비 조절 관련 상태 및 함수 추가 (구분 열 추가)
            const [colWidths, setColWidths] = useState({
                category: 60,   // 구분 열 너비
                name: 250,
                standard: 200,
                unit: 80,
                material: 90,
                labor: 90,
                expense: 90,
                total: 100
            });
            const resizingCol = useRef(null);
            const startX = useRef(0);
            const startWidth = useRef(0);

            const handleResizeStart = (e, colKey) => {
                e.preventDefault();
                e.stopPropagation();
                resizingCol.current = colKey;
                startX.current = e.pageX;
                startWidth.current = colWidths[colKey];
                
                const handleMouseMove = (moveEvent) => {
                    if (!resizingCol.current) return;
                    const diffX = moveEvent.pageX - startX.current;
                    const newWidth = Math.max(50, startWidth.current + diffX); // 최소 너비 50px 보장
                    setColWidths(prev => ({ ...prev, [resizingCol.current]: newWidth }));
                };

                const handleMouseUp = () => {
                    resizingCol.current = null;
                    document.removeEventListener('mousemove', handleMouseMove);
                    document.removeEventListener('mouseup', handleMouseUp);
                };

                document.addEventListener('mousemove', handleMouseMove);
                document.addEventListener('mouseup', handleMouseUp);
            };

            // 테이블 전체 너비를 개별 열 너비의 합으로 고정
            const tableWidth = colWidths.category + colWidths.name + colWidths.standard + colWidths.unit + colWidths.material + colWidths.labor + colWidths.expense + colWidths.total;

            // 앱 로드 시 DB에 데이터가 있는지 확인하고, 없으면 자동 동기화 실행
            useEffect(() => {
                const init = async () => {
                    const count = await db.unitPriceList.count();
                    if (count > 0) {
                        setIsDbReady(true);
                    } else {
                        syncFromGithub(true);
                    }
                };
                init();
            }, []);

            // 키보드 방향키 이동 로직
            useEffect(() => {
                const handleKeyDown = (e) => {
                    if (activeTab !== 'search' || searchResults.length === 0) return;
                    
                    // 입력창에 포커스가 있을 때는 방향키 이동 비활성화 (글자 커서 이동을 위해)
                    if (document.activeElement.tagName.toLowerCase() === 'input') return;

                    if (e.key === 'ArrowDown') {
                        e.preventDefault(); // 전체 페이지 스크롤 방지
                        if (!selectedItem) {
                            handleItemClick(searchResults[0]);
                        } else {
                            const currentIndex = searchResults.findIndex(item => item.id === selectedItem.id);
                            if (currentIndex >= 0 && currentIndex < searchResults.length - 1) {
                                handleItemClick(searchResults[currentIndex + 1]);
                            }
                        }
                    } else if (e.key === 'ArrowUp') {
                        e.preventDefault(); // 전체 페이지 스크롤 방지
                        if (selectedItem) {
                            const currentIndex = searchResults.findIndex(item => item.id === selectedItem.id);
                            if (currentIndex > 0) {
                                handleItemClick(searchResults[currentIndex - 1]);
                            }
                        }
                    }
                };

                window.addEventListener('keydown', handleKeyDown);
                return () => window.removeEventListener('keydown', handleKeyDown);
            }, [activeTab, searchResults, selectedItem]);

            // 선택된 항목이 변경될 때마다 화면에 보이도록 스크롤 이동
            useEffect(() => {
                if (selectedRowRef.current) {
                    selectedRowRef.current.scrollIntoView({
                        behavior: 'smooth',
                        block: 'nearest'
                    });
                }
            }, [selectedItem]);

            const checkDbStatus = async () => {
                const count = await db.unitPriceList.count();
                if (count > 0) setIsDbReady(true);
            };

            const processRowData = (tableName, row) => {
                if (tableName === 'unitPriceList') {
                    if (row[0] === '코  드' || row[1] === '일 위 대 가 목 록' || String(row[1]).includes('25-군 공통')) return null;
                    if (!row[0]) return null;

                    // I열(인덱스 8) 번호 데이터에서 앞 2글자 추출
                    const rawRefNumber = row[8] ? String(row[8]).trim() : '';
                    const category = rawRefNumber ? rawRefNumber.substring(0, 2) : '';

                    return {
                        code: String(row[0]).trim(),
                        name: row[1] || '',
                        standard: row[2] || '',
                        unit: row[3] || '',
                        material: row[4] || '0',
                        labor: row[5] || '0',
                        expense: row[6] || '0',
                        total: row[7] || '0',
                        refNumber: rawRefNumber,
                        category: category,             // 추가: 호표 번호 앞 2자리 (구분용)
                        remark: row[9] || '',           // 수정: J열 비고 데이터 (인덱스 9)
                        searchIndex: row.join(' ').toLowerCase()
                    };
                } else if (tableName === 'unitPriceDetail') {
                    if (row[0] === '품      명' || String(row[0]).includes('25-군 공통') || row[4] === '단  가') return null;
                    if (!row[13] || String(row[13]).trim() === '') return null;

                    return {
                        name: row[0] || '',
                        standard: row[1] || '',
                        unit: row[2] || '',
                        quantity: row[3] || '',
                        matPrice: row[4] || '0',
                        matAmt: row[5] || '0',
                        labPrice: row[6] || '0',
                        labAmt: row[7] || '0',
                        expPrice: row[8] || '0',
                        expAmt: row[9] || '0',
                        totPrice: row[10] || '0',
                        totAmt: row[11] || '0',
                        parentCode: String(row[13]).trim()
                    };
                }
                return null;
            };

            const syncFromGithub = async (isAuto = false) => {
                if (!isAuto && !confirm("GitHub에서 최신 데이터를 가져와 DB를 갱신하시겠습니까?\n(기존 데이터는 덮어씌워집니다)")) return;
                
                const GITHUB_BASE_URL = "https://hongstar2776-cmyk.github.io/My-Dashboard/"; 
                
                const filesToFetch = [
                    { url: "unit_price_list.csv", table: "unitPriceList", name: "일위대가목록" },
                    { url: "unit_price_detail.csv", table: "unitPriceDetail", name: "상세내역(일위대가)" }
                ];

                let successCount = 0;

                for (let i = 0; i < filesToFetch.length; i++) {
                    const file = filesToFetch[i];
                    setLoadingMessage(`[${i+1}/${filesToFetch.length}] ${file.name} 다운로드 및 파싱 중... (최초 1회 실행)`);
                    
                    try {
                        await new Promise((resolve, reject) => {
                            Papa.parse(GITHUB_BASE_URL + file.url, {
                                download: true, 
                                header: false,
                                skipEmptyLines: true,
                                complete: async (results) => {
                                    try {
                                        await db[file.table].clear();
                                        const records = [];
                                        
                                        for (let row of results.data) {
                                            const parsedData = processRowData(file.table, row);
                                            if (parsedData) {
                                                records.push(parsedData);
                                            }
                                        }
                                        
                                        await db[file.table].bulkAdd(records);
                                        successCount++;
                                        resolve();
                                    } catch (e) {
                                        reject(e);
                                    }
                                },
                                error: (err) => reject(new Error(`다운로드 실패: ${err}`))
                            });
                        });
                    } catch (error) {
                        console.error(error);
                        if (!isAuto) alert(`❌ ${file.name} 가져오기 실패.\nGitHub 주소에 파일이 정확히 있는지 확인해주세요.`);
                        break; 
                    }
                }
                
                setLoadingMessage('');
                if (successCount === filesToFetch.length) {
                    if (!isAuto) alert("✅ GitHub 데이터 연동이 완료되었습니다!");
                    checkDbStatus();
                    setActiveTab('search');
                }
            };

            const handleFileUpload = async (event, tableName) => {
                const file = event.target.files[0];
                if (!file) return;

                setLoadingMessage(`${file.name} 파싱 및 저장 중...`);
                
                Papa.parse(file, {
                    header: false,
                    skipEmptyLines: true,
                    complete: async (results) => {
                        try {
                            await db[tableName].clear();
                            const records = [];
                            
                            for (let row of results.data) {
                                const parsedData = processRowData(tableName, row);
                                if (parsedData) records.push(parsedData);
                            }

                            await db[tableName].bulkAdd(records);
                            setLoadingMessage('');
                            alert(`${file.name} 저장 완료! (${records.length}건)`);
                            checkDbStatus();
                        } catch (error) {
                            console.error(error);
                            alert("저장 중 오류가 발생했습니다.");
                            setLoadingMessage('');
                        }
                    }
                });
            };

            // 검색 기능 수정: 다중 키워드 띄어쓰기 검색 (AND 조건)
            const handleSearch = async (e) => {
                e.preventDefault();
                if (!keyword.trim() || !isDbReady) return;

                setIsSearching(true);
                setSelectedItem(null);
                setRelatedDetails([]);

                try {
                    // 1. 검색어를 소문자로 바꾸고 띄어쓰기 기준으로 쪼개서 배열로 만듭니다. (빈 문자열 제거)
                    const searchTerms = keyword.toLowerCase().split(' ').filter(term => term.trim() !== '');

                    const results = await db.unitPriceList
                        // 2. 쪼개진 검색어 배열의 '모든' 단어가 searchIndex에 포함되어야 참 반환
                        .filter(item => {
                            return searchTerms.every(term => item.searchIndex.includes(term));
                        })
                        .limit(200)
                        .toArray();

                    setSearchResults(results);
                } catch (error) {
                    console.error("검색 오류:", error);
                } finally {
                    setIsSearching(false);
                }
            };

            const handleItemClick = async (item) => {
                setSelectedItem(item);
                try {
                    const details = await db.unitPriceDetail
                        .where('parentCode').equals(item.code)
                        .toArray();
                    setRelatedDetails(details);
                } catch (err) {
                    console.error("상세 데이터 조회 실패:", err);
                }
            };

            return (
                <div className="min-h-screen flex flex-col">
                    {/* 데스크탑 화면에서 패널 분할 비율을 적용하기 위한 동적 스타일 */}
                    <style>{`
                        @media (min-width: 1024px) {
                            .split-left { width: calc(${leftSplit}% - 12px) !important; flex-shrink: 0; }
                            .split-right { width: calc(${100 - leftSplit}% - 12px) !important; flex-shrink: 0; }
                        }
                    `}</style>

                    {/* 상단 네비게이션 */}
                    <header className="bg-blue-800 text-white p-4 shadow-md flex justify-between items-center z-10 relative">
                        <h1 className="text-xl font-bold flex items-center gap-2">
                            <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"></path></svg>
                            일위대가 검색
                        </h1>
                        <div className="flex gap-4">
                            <button 
                                onClick={() => setActiveTab('search')}
                                className={`px-4 py-2 rounded-md transition-colors ${activeTab === 'search' ? 'bg-blue-600 font-semibold' : 'hover:bg-blue-700'}`}
                            >
                                검색 모드
                            </button>
                            <button 
                                onClick={() => setActiveTab('upload')}
                                className={`px-4 py-2 rounded-md transition-colors ${activeTab === 'upload' ? 'bg-blue-600 font-semibold' : 'hover:bg-blue-700'}`}
                            >
                                DB 데이터 설정
                            </button>
                        </div>
                    </header>

                    {/* 메인 콘텐츠 영역 */}
                    <main className="flex-1 p-6 max-w-[1920px] w-[95%] mx-auto">
                        
                        {/* 로딩 오버레이 */}
                        {loadingMessage && (
                            <div className="fixed inset-0 bg-black bg-opacity-60 flex flex-col items-center justify-center z-50 text-white">
                                <div className="animate-spin rounded-full h-16 w-16 border-t-4 border-b-4 border-blue-500 mb-4"></div>
                                <p className="text-xl font-bold">{loadingMessage}</p>
                                <p className="text-sm text-slate-300 mt-2">최초 1회만 소요되며, 이후에는 0.1초만에 검색됩니다.</p>
                            </div>
                        )}

                        {/* 데이터 업로드 탭 */}
                        {activeTab === 'upload' && (
                            <div className="bg-white p-8 rounded-xl shadow-sm border border-slate-200">
                                <h2 className="text-2xl font-bold mb-6 text-slate-800">CSV 데이터 설정 (속도 최적화)</h2>
                                <p className="text-slate-600 mb-8 leading-relaxed">
                                    업로드된 데이터는 사용자의 <b>브라우저 내부 DB(IndexedDB)</b>에 영구 저장됩니다.<br/>
                                    <span className="text-blue-600 font-semibold">※ 파싱 최적화를 위해 [일위대가목록]과 [상세내역(일위대가)] 2개의 파일만 처리하도록 간소화되었습니다.</span>
                                </p>

                                {/* 깃허브 자동 동기화 섹션 */}
                                <div className="mb-10 p-6 bg-blue-50 border border-blue-200 rounded-lg">
                                    <h3 className="font-bold text-lg text-blue-800 mb-2 flex items-center gap-2">
                                        <svg className="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M12 0c-6.626 0-12 5.373-12 12 0 5.302 3.438 9.8 8.207 11.387.599.111.793-.261.793-.577v-2.234c-3.338.726-4.033-1.416-4.033-1.416-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.084 1.839 1.237 1.839 1.237 1.07 1.834 2.807 1.304 3.492.997.107-.775.418-1.305.762-1.604-2.665-.305-5.467-1.334-5.467-5.931 0-1.311.469-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.301 1.23.957-.266 1.983-.399 3.003-.404 1.02.005 2.047.138 3.006.404 2.291-1.552 3.297-1.23 3.297-1.23.653 1.653.242 2.874.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.609-2.807 5.624-5.479 5.921.43.372.823 1.102.823 2.222v3.293c0 .319.192.694.801.576 4.765-1.589 8.199-6.086 8.199-11.386 0-6.627-5.373-12-12-12z"/></svg>
                                        GitHub에서 데이터 강제 갱신
                                    </h3>
                                    <p className="text-sm text-blue-700 mb-4 leading-relaxed">
                                        GitHub에 올려둔 최신 CSV 파일들을 다운로드하여 브라우저 DB를 덮어씁니다. (페이지 진입 시 자동 진행되나, 엑셀을 수정한 후 수동 갱신 시 사용)<br/>
                                        ※ 대상 파일: <code className="bg-blue-100 px-1 rounded">unit_price_list.csv</code>, <code className="bg-blue-100 px-1 rounded">unit_price_detail.csv</code>
                                    </p>
                                    <button 
                                        onClick={() => syncFromGithub(false)}
                                        className="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-6 rounded-lg shadow transition-colors flex items-center gap-2"
                                    >
                                        <svg className="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                                        데이터 가져오기 및 DB 갱신
                                    </button>
                                </div>

                                <h3 className="text-lg font-bold mb-4 text-slate-700 border-t border-slate-200 pt-6">개별 파일 수동 업로드 (테스트용)</h3>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                    <div className="border border-slate-200 p-6 rounded-lg bg-slate-50">
                                        <h3 className="font-bold text-lg mb-2">1. 일위대가목록</h3>
                                        <input type="file" accept=".csv" onChange={(e) => handleFileUpload(e, 'unitPriceList')} className="block w-full text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100 cursor-pointer" />
                                    </div>
                                    <div className="border border-slate-200 p-6 rounded-lg bg-slate-50">
                                        <h3 className="font-bold text-lg mb-2">2. 상세내역(일위대가)</h3>
                                        <input type="file" accept=".csv" onChange={(e) => handleFileUpload(e, 'unitPriceDetail')} className="block w-full text-sm text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100 cursor-pointer" />
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* 검색 탭 */}
                        {activeTab === 'search' && (
                            <div className="flex flex-col h-full gap-6">
                                {/* 검색 바 */}
                                <div className="bg-white p-6 rounded-xl shadow-sm border border-slate-200">
                                    <form onSubmit={handleSearch} className="flex gap-4">
                                        <input 
                                            type="text" 
                                            value={keyword}
                                            onChange={(e) => setKeyword(e.target.value)}
                                            placeholder="검색어를 띄어쓰기로 여러 개 입력하세요 (예: 불도저 무한궤도 7ton)" 
                                            className="flex-1 p-4 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 text-lg shadow-inner"
                                            disabled={!isDbReady}
                                        />
                                        <button 
                                            type="submit" 
                                            disabled={!isDbReady || isSearching}
                                            className="bg-blue-600 hover:bg-blue-700 disabled:bg-slate-400 text-white px-8 py-4 rounded-lg font-bold text-lg transition-colors flex items-center gap-2"
                                        >
                                            {isSearching ? '검색중...' : '검색'}
                                        </button>
                                    </form>
                                    {!isDbReady && (
                                        <p className="mt-3 text-red-500 font-semibold text-sm">
                                            ※ DB를 준비 중입니다. 최초 접속 시 데이터 파싱이 끝날 때까지 잠시 대기해 주세요.
                                        </p>
                                    )}
                                </div>

                                {/* 검색 결과 통계 요약 (새로 추가된 부분) */}
                                {searchResults.length > 0 && (
                                    <div className="bg-white px-6 py-4 rounded-xl shadow-sm border border-slate-200 flex flex-wrap items-center justify-between gap-4">
                                        <div className="font-bold text-slate-800 flex items-center gap-2">
                                            <svg className="w-5 h-5 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path></svg>
                                            현재 검색값 <span className="text-sm font-normal text-slate-500 ml-1">(합계금액 기준)</span>
                                        </div>
                                        <div className="flex flex-wrap gap-x-6 gap-y-2 text-sm">
                                            <div className="flex items-center gap-2"><span className="text-slate-500">평균값:</span> <span className="font-mono font-bold text-blue-700">{formatNumber(searchStats.avg)}</span></div>
                                            <div className="flex items-center gap-2"><span className="text-slate-500">최빈값:</span> <span className="font-mono font-bold text-blue-700">{formatNumber(searchStats.mode)}</span></div>
                                            <div className="flex items-center gap-2"><span className="text-slate-500">최저값:</span> <span className="font-mono font-bold text-blue-700">{formatNumber(searchStats.min)}</span></div>
                                            <div className="flex items-center gap-2"><span className="text-slate-500">최고값:</span> <span className="font-mono font-bold text-blue-700">{formatNumber(searchStats.max)}</span></div>
                                        </div>
                                    </div>
                                )}

                                {/* 좌우 패널 및 스플리터 영역 컨테이너 */}
                                <div ref={splitContainerRef} className="flex flex-col lg:flex-row items-stretch lg:justify-between gap-6 lg:gap-0 h-auto lg:h-[650px]">
                                    
                                    {/* 검색 결과 목록 (왼쪽 패널) */}
                                    <div className="split-left w-full bg-white border border-slate-200 rounded-xl shadow-sm overflow-hidden flex flex-col h-[650px] lg:h-full">
                                        <div className="p-4 bg-slate-50 border-b border-slate-200 flex justify-between items-center">
                                            <h3 className="font-bold text-slate-800">목록 검색 결과 (방향키 상하 이동 가능)</h3>
                                            <span className="text-xs bg-blue-100 text-blue-800 px-2 py-1 rounded-full">
                                                {searchResults.length > 0 ? `최대 200건 표시` : '0건'}
                                            </span>
                                        </div>
                                        
                                        <div className="table-container flex-1 bg-white overflow-x-auto">
                                            <table className="text-sm text-left" style={{ tableLayout: 'fixed', width: tableWidth }}>
                                                <thead className="text-xs text-slate-500 uppercase bg-slate-50 sticky top-0 shadow-sm z-10">
                                                    <tr>
                                                        <th style={{ width: colWidths.category }} className="relative px-4 py-3 border-r border-slate-200 text-center">
                                                            구분
                                                            <div className="absolute right-0 top-0 bottom-0 w-1.5 cursor-col-resize hover:bg-blue-400 z-20" onMouseDown={(e) => handleResizeStart(e, 'category')}></div>
                                                        </th>
                                                        <th style={{ width: colWidths.name }} className="relative px-4 py-3 border-r border-slate-200">
                                                            품명
                                                            <div className="absolute right-0 top-0 bottom-0 w-1.5 cursor-col-resize hover:bg-blue-400 z-20" onMouseDown={(e) => handleResizeStart(e, 'name')}></div>
                                                        </th>
                                                        <th style={{ width: colWidths.standard }} className="relative px-4 py-3 border-r border-slate-200">
                                                            규격
                                                            <div className="absolute right-0 top-0 bottom-0 w-1.5 cursor-col-resize hover:bg-blue-400 z-20" onMouseDown={(e) => handleResizeStart(e, 'standard')}></div>
                                                        </th>
                                                        <th style={{ width: colWidths.unit }} className="relative px-4 py-3 text-center whitespace-nowrap border-r border-slate-200">
                                                            단위
                                                            <div className="absolute right-0 top-0 bottom-0 w-1.5 cursor-col-resize hover:bg-blue-400 z-20" onMouseDown={(e) => handleResizeStart(e, 'unit')}></div>
                                                        </th>
                                                        <th style={{ width: colWidths.material }} className="relative px-4 py-3 text-right whitespace-nowrap border-r border-slate-200">
                                                            재료비
                                                            <div className="absolute right-0 top-0 bottom-0 w-1.5 cursor-col-resize hover:bg-blue-400 z-20" onMouseDown={(e) => handleResizeStart(e, 'material')}></div>
                                                        </th>
                                                        <th style={{ width: colWidths.labor }} className="relative px-4 py-3 text-right whitespace-nowrap border-r border-slate-200">
                                                            노무비
                                                            <div className="absolute right-0 top-0 bottom-0 w-1.5 cursor-col-resize hover:bg-blue-400 z-20" onMouseDown={(e) => handleResizeStart(e, 'labor')}></div>
                                                        </th>
                                                        <th style={{ width: colWidths.expense }} className="relative px-4 py-3 text-right whitespace-nowrap border-r border-slate-200">
                                                            경비
                                                            <div className="absolute right-0 top-0 bottom-0 w-1.5 cursor-col-resize hover:bg-blue-400 z-20" onMouseDown={(e) => handleResizeStart(e, 'expense')}></div>
                                                        </th>
                                                        <th style={{ width: colWidths.total }} className="relative px-4 py-3 text-right whitespace-nowrap">
                                                            합계
                                                            <div className="absolute right-0 top-0 bottom-0 w-1.5 cursor-col-resize hover:bg-blue-400 z-20" onMouseDown={(e) => handleResizeStart(e, 'total')}></div>
                                                        </th>
                                                    </tr>
                                                </thead>
                                                <tbody>
                                                    {searchResults.length === 0 ? (
                                                        <tr>
                                                            <td colSpan="8" className="px-4 py-12 text-center text-slate-400">
                                                                검색 결과가 없습니다.
                                                            </td>
                                                        </tr>
                                                    ) : (
                                                        searchResults.map((item, idx) => (
                                                            <tr 
                                                                key={idx} 
                                                                ref={selectedItem?.id === item.id ? selectedRowRef : null}
                                                                onClick={() => handleItemClick(item)}
                                                                className={`border-b border-slate-100 cursor-pointer transition-colors ${selectedItem?.id === item.id ? 'bg-blue-100 border-l-4 border-l-blue-500' : 'hover:bg-blue-50'}`}
                                                            >
                                                                <td className="px-4 py-3 text-center font-bold text-slate-500 truncate">{item.category}</td>
                                                                <td className="px-4 py-3 font-semibold text-slate-800 truncate" title={item.name}>{item.name}</td>
                                                                <td className="px-4 py-3 text-slate-600 truncate" title={item.standard}>{item.standard}</td>
                                                                <td className="px-4 py-3 text-center text-slate-500 truncate">{item.unit}</td>
                                                                <td className="px-4 py-3 text-right text-slate-600 font-mono text-xs truncate">{formatNumber(item.material)}</td>
                                                                <td className="px-4 py-3 text-right text-slate-600 font-mono text-xs truncate">{formatNumber(item.labor)}</td>
                                                                <td className="px-4 py-3 text-right text-slate-600 font-mono text-xs truncate">{formatNumber(item.expense)}</td>
                                                                <td className="px-4 py-3 text-right text-blue-700 font-bold font-mono truncate">{formatNumber(item.total)}</td>
                                                            </tr>
                                                        ))
                                                    )}
                                                </tbody>
                                            </table>
                                        </div>
                                    </div>

                                    {/* 중앙 드래그 스플리터 (데스크탑에서만 표시) */}
                                    <div 
                                        className="hidden lg:flex w-[24px] cursor-col-resize items-center justify-center group flex-shrink-0"
                                        onMouseDown={handleSplitMouseDown}
                                        title="드래그하여 크기 조절"
                                    >
                                        <div className="w-1.5 h-16 bg-slate-200 rounded-full group-hover:bg-blue-500 transition-colors"></div>
                                    </div>

                                    {/* 상세 내역 뷰 (오른쪽 패널) */}
                                    <div className="split-right w-full bg-white border border-slate-200 rounded-xl shadow-sm overflow-hidden flex flex-col h-[650px] lg:h-full">
                                        <div className="p-4 bg-slate-50 border-b border-slate-200">
                                            <h3 className="font-bold text-slate-800">선택 항목 상세 및 하위 구성 내역</h3>
                                        </div>
                                        
                                        <div className="p-6 overflow-y-auto flex-1 bg-slate-50/50">
                                            {!selectedItem ? (
                                                <div className="h-full flex flex-col items-center justify-center text-slate-400">
                                                    <svg className="w-16 h-16 mb-4 text-slate-300" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="1.5" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"></path></svg>
                                                    <p>좌측 목록에서 항목을 클릭하시면 상세 내역과<br/>하위 구성 데이터가 표시됩니다.</p>
                                                </div>
                                            ) : (
                                                <div>
                                                    {/* 상단 요약 카드 */}
                                                    <div className="bg-white p-5 rounded-lg border border-slate-200 shadow-sm mb-4">
                                                        <h4 className="text-xl font-bold text-blue-800 mb-2">{selectedItem.name}</h4>
                                                        <div className="grid grid-cols-2 gap-y-2 text-sm text-slate-600 mt-4">
                                                            <div><span className="font-semibold text-slate-500 mr-2">연결 코드:</span> <span className="font-mono text-xs bg-slate-100 px-1 py-0.5 rounded">{selectedItem.code}</span></div>
                                                            <div><span className="font-semibold text-slate-500 mr-2">규격:</span> {selectedItem.standard}</div>
                                                            <div><span className="font-semibold text-slate-500 mr-2">단위:</span> {selectedItem.unit}</div>
                                                            <div><span className="font-semibold text-slate-500 mr-2">호표번호:</span> <span className="text-xs text-blue-600 font-semibold">{selectedItem.refNumber || '없음'}</span></div>
                                                        </div>
                                                        <div className="grid grid-cols-4 gap-2 mt-4 pt-4 border-t border-slate-100">
                                                            <div className="text-center bg-slate-50 p-2 rounded">
                                                                <div className="text-xs text-slate-500 mb-1">총 재료비</div>
                                                                <div className="font-mono text-sm">{formatNumber(selectedItem.material)}</div>
                                                            </div>
                                                            <div className="text-center bg-slate-50 p-2 rounded">
                                                                <div className="text-xs text-slate-500 mb-1">총 노무비</div>
                                                                <div className="font-mono text-sm">{formatNumber(selectedItem.labor)}</div>
                                                            </div>
                                                            <div className="text-center bg-slate-50 p-2 rounded">
                                                                <div className="text-xs text-slate-500 mb-1">총 경비</div>
                                                                <div className="font-mono text-sm">{formatNumber(selectedItem.expense)}</div>
                                                            </div>
                                                            <div className="text-center bg-blue-50 p-2 rounded border border-blue-100">
                                                                <div className="text-xs text-blue-600 font-semibold mb-1">총 합계</div>
                                                                <div className="font-mono font-bold text-blue-800">{formatNumber(selectedItem.total)}</div>
                                                            </div>
                                                        </div>
                                                    </div>

                                                    {/* 비고란 영역 추가 (CSV J열 - 인덱스 9 매핑) */}
                                                    <div className="bg-white p-4 rounded-lg border border-slate-200 shadow-sm mb-6">
                                                        <h5 className="font-bold text-slate-700 mb-2 text-sm flex items-center gap-2">
                                                            <svg className="w-4 h-4 text-slate-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                                                            비고
                                                        </h5>
                                                        <div className="text-sm text-slate-600 bg-slate-50 p-3 rounded border border-slate-100 min-h-[40px] whitespace-pre-wrap">
                                                            {selectedItem.remark || ''}
                                                        </div>
                                                    </div>

                                                    {/* 하위 구성 내역 (Detail N열 매핑) */}
                                                    <div>
                                                        <h5 className="font-bold text-slate-700 mb-3 flex items-center gap-2">
                                                            <svg className="w-5 h-5 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10"></path></svg>
                                                            하위 구성 내역 (단가 및 금액)
                                                        </h5>
                                                        
                                                        {relatedDetails.length > 0 ? (
                                                            <div className="overflow-x-auto bg-white border border-slate-200 rounded-lg">
                                                                <table className="w-full text-xs text-left whitespace-nowrap">
                                                                    <thead className="bg-slate-50 text-slate-500 border-b border-slate-200">
                                                                        <tr>
                                                                            <th className="px-3 py-2 text-center border-r border-slate-200" rowSpan="2">품명</th>
                                                                            <th className="px-3 py-2 text-center border-r border-slate-200" rowSpan="2">규격</th>
                                                                            <th className="px-3 py-2 text-center border-r border-slate-200" rowSpan="2">단위</th>
                                                                            <th className="px-3 py-2 text-center border-r border-slate-200" rowSpan="2">수량</th>
                                                                            <th className="px-3 py-2 text-center border-r border-slate-200" colSpan="2">재료비</th>
                                                                            <th className="px-3 py-2 text-center border-r border-slate-200" colSpan="2">노무비</th>
                                                                            <th className="px-3 py-2 text-center border-r border-slate-200" colSpan="2">경비</th>
                                                                            <th className="px-3 py-2 text-center" colSpan="2">합계</th>
                                                                        </tr>
                                                                        <tr>
                                                                            <th className="px-3 py-1 text-right bg-slate-100 border-r border-slate-200">단가</th>
                                                                            <th className="px-3 py-1 text-right bg-slate-100 border-r border-slate-200">금액</th>
                                                                            <th className="px-3 py-1 text-right bg-slate-100 border-r border-slate-200">단가</th>
                                                                            <th className="px-3 py-1 text-right bg-slate-100 border-r border-slate-200">금액</th>
                                                                            <th className="px-3 py-1 text-right bg-slate-100 border-r border-slate-200">단가</th>
                                                                            <th className="px-3 py-1 text-right bg-slate-100 border-r border-slate-200">금액</th>
                                                                            <th className="px-3 py-1 text-right bg-blue-50 border-r border-slate-200">단가</th>
                                                                            <th className="px-3 py-1 text-right bg-blue-50">금액</th>
                                                                        </tr>
                                                                    </thead>
                                                                    <tbody>
                                                                        {relatedDetails.map((det, idx) => (
                                                                            <tr key={idx} className="border-b border-slate-100 hover:bg-slate-50">
                                                                                <td className="px-3 py-2 font-medium text-slate-800 break-keep border-r border-slate-100">{det.name}</td>
                                                                                <td className="px-3 py-2 text-slate-600 truncate max-w-[120px] border-r border-slate-100" title={det.standard}>{det.standard}</td>
                                                                                <td className="px-3 py-2 text-center text-slate-500 border-r border-slate-100">{det.unit}</td>
                                                                                <td className="px-3 py-2 text-center text-blue-600 font-mono font-bold border-r border-slate-100">{det.quantity}</td>
                                                                                <td className="px-3 py-2 text-right text-slate-500 font-mono border-r border-slate-100">{formatNumber(det.matPrice)}</td>
                                                                                <td className="px-3 py-2 text-right text-slate-800 font-mono font-semibold border-r border-slate-100">{formatNumber(det.matAmt)}</td>
                                                                                <td className="px-3 py-2 text-right text-slate-500 font-mono border-r border-slate-100">{formatNumber(det.labPrice)}</td>
                                                                                <td className="px-3 py-2 text-right text-slate-800 font-mono font-semibold border-r border-slate-100">{formatNumber(det.labAmt)}</td>
                                                                                <td className="px-3 py-2 text-right text-slate-500 font-mono border-r border-slate-100">{formatNumber(det.expPrice)}</td>
                                                                                <td className="px-3 py-2 text-right text-slate-800 font-mono font-semibold border-r border-slate-100">{formatNumber(det.expAmt)}</td>
                                                                                <td className="px-3 py-2 text-right text-blue-600 font-mono border-r border-slate-100">{formatNumber(det.totPrice)}</td>
                                                                                <td className="px-3 py-2 text-right font-bold text-blue-700 font-mono">{formatNumber(det.totAmt)}</td>
                                                                            </tr>
                                                                        ))}
                                                                    </tbody>
                                                                    {/* 하위 구성 내역 합계(계) 행 추가 */}
                                                                    <tfoot className="bg-blue-50 font-bold border-t-2 border-blue-200">
                                                                        <tr>
                                                                            <td className="px-3 py-3 text-center text-blue-900 border-r border-blue-100" colSpan="4">[계]</td>
                                                                            <td className="px-3 py-3 text-right text-slate-400 border-r border-blue-100 bg-slate-50/50">-</td>
                                                                            <td className="px-3 py-3 text-right text-blue-900 font-mono border-r border-blue-100">{formatNumber(detailTotals.mat)}</td>
                                                                            <td className="px-3 py-3 text-right text-slate-400 border-r border-blue-100 bg-slate-50/50">-</td>
                                                                            <td className="px-3 py-3 text-right text-blue-900 font-mono border-r border-blue-100">{formatNumber(detailTotals.lab)}</td>
                                                                            <td className="px-3 py-3 text-right text-slate-400 border-r border-blue-100 bg-slate-50/50">-</td>
                                                                            <td className="px-3 py-3 text-right text-blue-900 font-mono border-r border-blue-100">{formatNumber(detailTotals.exp)}</td>
                                                                            <td className="px-3 py-3 text-right text-slate-400 border-r border-blue-100 bg-slate-50/50">-</td>
                                                                            <td className="px-3 py-3 text-right text-blue-900 font-mono text-sm">{formatNumber(detailTotals.tot)}</td>
                                                                        </tr>
                                                                    </tfoot>
                                                                </table>
                                                            </div>
                                                        ) : (
                                                            <div className="p-8 bg-slate-50 text-slate-400 text-center rounded-lg border border-slate-100 flex flex-col items-center">
                                                                <svg className="w-10 h-10 mb-2 opacity-50" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="1.5" d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4"></path></svg>
                                                                연결된 하위 상세 내역이 없습니다.
                                                            </div>
                                                        )}
                                                    </div>
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
