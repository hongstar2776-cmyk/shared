<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>건축 공정표 관리 프로그램</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React & ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- Babel for JSX -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    body { font-family: 'Malgun Gothic', sans-serif; background-color: #f8fafc; }
    .select-none { user-select: none; }
    
    /* 스크롤바 커스텀 */
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: #f1f5f9; border-radius: 4px; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- Firebase 모듈 사전 로드 (Auth 제외, Firestore 단일 연결) -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getFirestore, collection, getDocs, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";

    // 알려주신 메인 프로젝트 DB 구성
    const firebaseConfig = {
      apiKey: "AIzaSyDL5m8zW1PF6Y_PBHGV7mM4NoquTmrt0RM",
      authDomain: "project-list-21920.firebaseapp.com",
      projectId: "project-list-21920",
      storageBucket: "project-list-21920.firebasestorage.app",
      messagingSenderId: "973863678039",
      appId: "1:973863678039:web:3d41a45c845a27cb3ff312"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    // React에서 접근 가능하도록 전역 변수로 노출
    window.FirebaseAPI = {
      db, collection, getDocs, doc, setDoc, getDoc,
      auth, provider, signInWithPopup, signOut
    };
    
    // 로딩 완료 이벤트
    window.dispatchEvent(new Event('firebase-api-ready'));
  </script>

  <script type="text/babel">
    const { useState, useMemo, useRef, useEffect } = React;

    // 아이콘 컴포넌트
    const Icon = ({ name, size = 24, className = "" }) => {
      const icons = {
        Plus: <><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></>,
        Trash2: <><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></>,
        Calendar: <><rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect><line x1="16" y1="2" x2="16" y2="6"></line><line x1="8" y1="2" x2="8" y2="6"></line><line x1="3" y1="10" x2="21" y2="10"></line></>,
        Clock: <><circle cx="12" cy="12" r="10"></circle><polyline points="12 6 12 12 16 14"></polyline></>,
        Download: <><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></>,
        Settings: <><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></>,
        Building2: <><path d="M6 22V4a2 2 0 0 1 2-2h8a2 2 0 0 1 2 2v18Z"/><path d="M6 12H4a2 2 0 0 0-2 2v6a2 2 0 0 0 2 2h2"/><path d="M18 9h2a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2h-2"/><path d="M10 6h4"/><path d="M10 10h4"/><path d="M10 14h4"/><path d="M10 18h4"/></>,
        ChevronDown: <><polyline points="6 9 12 15 18 9"></polyline></>,
        ChevronRight: <><polyline points="9 18 15 12 9 6"></polyline></>,
        X: <><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></>,
        TrendingUp: <><polyline points="23 6 13.5 15.5 8.5 10.5 1 18"></polyline><polyline points="17 6 23 6 23 12"></polyline></>,
        DollarSign: <><line x1="12" y1="1" x2="12" y2="23"></line><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path></>,
        ListFilter: <><path d="M3 6h18"/><path d="M7 12h10"/><path d="M10 18h4"/></>,
        Database: <><ellipse cx="12" cy="5" rx="9" ry="3"></ellipse><path d="M21 12c0 1.66-4 3-9 3s-9-1.34-9-3"></path><path d="M3 5v14c0 1.66 4 3 9 3s9-1.34 9-3V5"></path></>,
        Save: <><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></>,
        FolderOpen: <><path d="m6 14 1.45-2.9A2 2 0 0 1 9.24 10H20a2 2 0 0 1 1.94 2.5l-1.55 6a2 2 0 0 1-1.94 1.5H4a2 2 0 0 1-2-2V5c0-1.1.9-2 2-2h3.93a2 2 0 0 1 1.66.9l.82 1.2a2 2 0 0 0 1.66.9H18a2 2 0 0 1 2 2v2"></path></>,
        Upload: <><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></>,
        AlertTriangle: <><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"></path><line x1="12" y1="9" x2="12" y2="13"></line><line x1="12" y1="17" x2="12.01" y2="17"></line></>,
        Cloud: <><path d="M17.5 19H9a7 7 0 1 1 6.71-9h1.79a4.5 4.5 0 1 1 0 9Z"/></>,
        CloudUpload: <><path d="M4 14.899A7 7 0 1 1 15.71 8h1.79a4.5 4.5 0 0 1 2.5 8.242"/><path d="M12 12v9"/><path d="m16 16-4-4-4 4"/></>,
        CloudDownload: <><path d="M4 14.899A7 7 0 1 1 15.71 8h1.79a4.5 4.5 0 0 1 2.5 8.242"/><path d="M12 12v9"/><path d="m8 16 4 4 4-4"/></>,
        Search: <><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></>,
        Server: <><rect width="20" height="8" x="2" y="2" rx="2" ry="2"/><rect width="20" height="8" x="2" y="14" rx="2" ry="2"/><line x1="6" x2="6.01" y1="6" y2="6"/><line x1="6" x2="6.01" y1="18" y2="18"/></>,
        History: <><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M12 7v5l4 2"/></>
      };
      return (
        <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}>
          {icons[name]}
        </svg>
      );
    };

    // Firebase Base 경로 상수
    const FB_BASE = {
      appId: "project-list-21920",
      path: ['artifacts', 'project-list-21920', 'public', 'data']
    };

    const App = () => {
      // 1. 프로젝트 기본 정보
      const [projectInfo, setProjectInfo] = useState({
        name: '2026 신축 공사 프로젝트',
        start: '2026-01-01',
        end: '2026-12-31'
      });
      const [todayDate, setTodayDate] = useState('2026-06-15');

      // 서버 연결 상태 관리
      const [isServerMode, setIsServerMode] = useState(false);
      const [firebaseReady, setFirebaseReady] = useState(false);
      const [currentUser, setCurrentUser] = useState(null); // 구글 로그인 유저 정보
      
      const [isSearchModalOpen, setIsSearchModalOpen] = useState(false);
      const [isHistoryModalOpen, setIsHistoryModalOpen] = useState(false);
      const [serverProjectList, setServerProjectList] = useState([]);
      const [historyList, setHistoryList] = useState([]);
      const [searchQuery, setSearchQuery] = useState('');
      const [selectedProjectId, setSelectedProjectId] = useState(null);

      // 2. 공정 데이터 (초기 샘플)
      const [tasks, setTasks] = useState([
        { id: '1', name: '가설 및 토공사', level: 0, expanded: true },
        { id: '1-1', parentId: '1', name: '토공사', level: 1, expanded: true },
        { id: '1-1-1', parentId: '1-1', name: '규준틀 및 현황측량', level: 2, start: '2026-01-05', end: '2026-01-15', amount: 15000000 },
        { id: '1-1-2', parentId: '1-1', name: '터파기 및 잔토처리', level: 2, start: '2026-01-16', end: '2026-02-28', amount: 45000000 },
        { id: '2', name: '골조 및 철근콘크리트', level: 0, expanded: true },
        { id: '2-1', parentId: '2', name: '기초 및 지하층', level: 1, expanded: true },
        { id: '2-1-1', parentId: '2-1', name: '기초 철근배근', level: 2, start: '2026-03-01', end: '2026-03-20', amount: 55000000 },
        { id: '2-1-2', parentId: '2-1', name: '기초 콘크리트 타설', level: 2, start: '2026-03-21', end: '2026-03-30', amount: 40000000 },
      ]);

      // 3. UI 상태
      const [modalMode, setModalMode] = useState(null); 
      const [activeParentId, setActiveParentId] = useState(null);
      const [isAdding, setIsAdding] = useState(false);
      const [editingTask, setEditingTask] = useState(null);
      const [newTask, setNewTask] = useState({ name: '', start: '2026-01-01', end: '2026-01-31', amount: 0, parentId: '' });
      const [exportInterval, setExportInterval] = useState('10days');
      const [exportScope, setExportScope] = useState('all');
      const [dragState, setDragState] = useState(null);
      const [quickDateEdit, setQuickDateEdit] = useState(null);
      const [toastMsg, setToastMsg] = useState('');
      const chartRef = useRef(null);

      const showToast = (msg) => {
        setToastMsg(msg);
        setTimeout(() => setToastMsg(''), 3000);
      };

      // --- Firebase 초기화 ---
      useEffect(() => {
        const initFirebase = async () => {
          try {
            if (!window.FirebaseAPI) {
              await new Promise(resolve => window.addEventListener('firebase-api-ready', resolve));
            }
            setFirebaseReady(true);
          } catch (error) {
            console.warn("Firebase 로딩 에러:", error);
            showToast("서버 모듈 연결에 실패했습니다.");
          }
        };
        initFirebase();
      }, []);

      // 날짜 유틸리티
      const dateToMs = (dateStr) => {
        if (!dateStr) return 0;
        const t = new Date(dateStr).getTime();
        return isNaN(t) ? 0 : t;
      };

      const msToDate = (ms) => {
        if (!ms || isNaN(ms)) return new Date().toISOString().split('T')[0];
        try {
          return new Date(ms).toISOString().split('T')[0];
        } catch (e) {
          return new Date().toISOString().split('T')[0];
        }
      };

      // --- 월별 분할 예산 계산 로직 (budget DB 저장용) ---
      const calculateMonthlyBudget = () => {
        const level2Tasks = tasks.filter(t => t.level === 2);
        const monthly = {};

        level2Tasks.forEach(task => {
          const s = dateToMs(task.start);
          const e = dateToMs(task.end);
          if (s === 0 || e === 0 || s > e) return;

          const totalDays = Math.round((e - s) / 86400000) + 1;
          const dailyCost = (task.amount || 0) / totalDays;

          for (let d = s; d <= e; d += 86400000) {
            const dt = new Date(d);
            const yyyy = dt.getFullYear();
            const mm = String(dt.getMonth() + 1).padStart(2, '0');
            const key = `${yyyy}-${mm}`; // ex) "2026-04"
            if (!monthly[key]) monthly[key] = 0;
            monthly[key] += dailyCost;
          }
        });

        // 반올림 처리
        Object.keys(monthly).forEach(k => {
          monthly[k] = Math.round(monthly[k]);
        });

        return monthly;
      };

      // [서버] 프로젝트 목록 불러오기 (projects 컬렉션)
      const fetchServerProjects = async () => {
        if (!firebaseReady || !window.FirebaseAPI) return;
        try {
          const { db, collection, getDocs } = window.FirebaseAPI;
          const querySnapshot = await getDocs(collection(db, ...FB_BASE.path, 'projects'));
          
          let list = [];
          querySnapshot.forEach((doc) => {
            list.push({
              id: doc.id,
              projectName: doc.data().projectName || '이름 없음',
              start: doc.data().startDate || '',
              end: doc.data().endDate || ''
            });
          });
          setServerProjectList(list);
        } catch (error) {
          console.warn("프로젝트 목록 조회 실패:", error);
          showToast("권한이 없거나 서버와 연결할 수 없습니다. (Firestore 규칙 확인 필요)");
        }
      };

      const handleOpenSearch = () => {
        if (!firebaseReady) {
          showToast("서버 연결이 준비되지 않았습니다.");
          return;
        }
        fetchServerProjects();
        setIsSearchModalOpen(true);
      };

      const handleSelectProject = (proj) => {
        setProjectInfo({
          ...projectInfo,
          name: proj.projectName,
          start: proj.start || projectInfo.start,
          end: proj.end || projectInfo.end
        });
        setSelectedProjectId(proj.id);
        setIsSearchModalOpen(false);
        setSearchQuery('');
        showToast(`[${proj.projectName}] 최신 데이터를 가져옵니다.`);
        
        // 연결 즉시 DB에서 최신 데이터 불러오기
        loadFromServerDB(proj.id);
      };

      // 모드 변경 (로컬 <-> 서버 및 구글 로그인)
      const handleLocalModeClick = async () => {
        if (!isServerMode) return; 
        
        try {
          if (window.FirebaseAPI && window.FirebaseAPI.auth && window.FirebaseAPI.auth.currentUser) {
            await window.FirebaseAPI.signOut(window.FirebaseAPI.auth);
          }
        } catch (error) {
          console.warn("로그아웃 에러:", error);
        }
        
        setIsServerMode(false);
        setCurrentUser(null);
        setSelectedProjectId(null);
        showToast("로컬 모드로 전환되었습니다. (로그아웃 완료)");
      };

      const handleServerModeClick = async () => {
        if (isServerMode) return; 
        
        if (!firebaseReady || !window.FirebaseAPI) {
          showToast("서버 연결이 준비되지 않았습니다.");
          return;
        }

        try {
          const { auth, provider, signInWithPopup } = window.FirebaseAPI;
          const result = await signInWithPopup(auth, provider);
          const user = result.user;
          
          setCurrentUser(user);
          setIsServerMode(true);
          showToast(`[${user.displayName}]님 환영합니다. 서버 연동 모드로 전환되었습니다.`);
        } catch (error) {
          console.warn("로그인 실패 세부 정보:", error);
          if (error.code === 'auth/popup-closed-by-user') {
            showToast("로그인이 취소되었습니다.");
          } else if (error.code === 'auth/unauthorized-domain') {
            showToast("파이어베이스 승인 도메인 에러입니다. 로컬 서버(localhost)에서 실행해주세요.");
          } else {
            showToast(`로그인 실패: ${error.message}`);
          }
        }
      };

      // --- 저장/불러오기 라우팅 로직 ---
      const handleSave = () => {
        if (isServerMode) {
          if (!selectedProjectId) return showToast("저장할 프로젝트를 먼저 연결해주세요.");
          saveToServerDB();
        } else {
          saveToLocalDB();
        }
      };

      const handleLoad = () => {
        if (isServerMode) {
          if (!selectedProjectId) return showToast("불러올 프로젝트를 먼저 연결해주세요.");
          loadFromServerDB(selectedProjectId);
        } else {
          loadFromLocalDB();
        }
      };

      // [서버] 저장 로직 (gantt_charts, gantt_charts_budget, history 하위 컬렉션)
      const saveToServerDB = async () => {
        if (!window.FirebaseAPI || !selectedProjectId) return;
        try {
          const { db, doc, setDoc } = window.FirebaseAPI;
          const timestamp = Date.now();

          const currentData = {
            projectInfo,
            todayDate,
            tasks,
            updatedAt: timestamp,
            authorEmail: currentUser ? currentUser.email : 'unknown'
          };

          // 1. 공정표 최신 데이터 덮어쓰기 (gantt_charts)
          await setDoc(doc(db, ...FB_BASE.path, 'gantt_charts', selectedProjectId), currentData);

          // 2. 월별 예산 최신 데이터 덮어쓰기 (gantt_charts_budget)
          const monthlyBudget = calculateMonthlyBudget();
          const budgetPayload = {
            projectId: selectedProjectId,
            updatedAt: timestamp,
            ...monthlyBudget 
          };
          await setDoc(doc(db, ...FB_BASE.path, 'gantt_charts_budget', selectedProjectId), budgetPayload);

          // 3. (핵심) 하위 컬렉션에 과거 기록(History) 차곡차곡 쌓기
          // 경로: gantt_charts / 프로젝트ID / history / 타임스탬프
          const historyRef = doc(db, ...FB_BASE.path, 'gantt_charts', selectedProjectId, 'history', timestamp.toString());
          await setDoc(historyRef, currentData);

          showToast('공정표, 월별 예산 및 버전 기록(History)이 모두 안전하게 저장되었습니다.');
        } catch (error) {
          console.warn("서버 저장 에러:", error);
          showToast('서버 저장에 실패했습니다. Firestore 권한을 확인해주세요.');
        }
      };

      // [서버] 최신 불러오기 로직 (gantt_charts 메인 컬렉션)
      const loadFromServerDB = async (projId) => {
        if (!window.FirebaseAPI || !projId) return;
        try {
          const { db, doc, getDoc } = window.FirebaseAPI;
          const docSnap = await getDoc(doc(db, ...FB_BASE.path, 'gantt_charts', projId));
          
          if (docSnap.exists()) {
            const data = docSnap.data();
            if(data.projectInfo) setProjectInfo(data.projectInfo);
            if(data.todayDate) setTodayDate(data.todayDate);
            if(data.tasks) setTasks(data.tasks);
            // 메인 연결 시에는 알림 생략 (서치 모달에서 안내함)
          } else {
            showToast('연결된 프로젝트에 작성된 공정표가 없습니다. 새로 작성해주세요.');
          }
        } catch (error) {
          console.warn("서버 로드 에러:", error);
          showToast('서버 데이터를 불러오는 중 오류가 발생했습니다.');
        }
      };

      // [서버] 이전 기록(History) 목록 불러오기
      const fetchHistoryList = async () => {
        if (!window.FirebaseAPI || !selectedProjectId) {
          showToast("먼저 프로젝트를 연결해주세요.");
          return;
        }
        try {
          const { db, collection, getDocs } = window.FirebaseAPI;
          const historyColRef = collection(db, ...FB_BASE.path, 'gantt_charts', selectedProjectId, 'history');
          const snap = await getDocs(historyColRef);
          
          let list = [];
          snap.forEach(doc => {
            list.push({ id: doc.id, ...doc.data() });
          });

          // 오름차순(과거->최신) 정렬하여 v1, v2, v3 부여
          list.sort((a, b) => a.updatedAt - b.updatedAt);
          list = list.map((item, index) => ({
            ...item,
            versionNum: index + 1 // 가상의 버전 넘버 (1번부터 시작)
          }));

          // 화면 출력용으로는 내림차순(최신->과거) 정렬
          list.sort((a, b) => b.updatedAt - a.updatedAt);
          
          setHistoryList(list);
          setIsHistoryModalOpen(true);
        } catch (error) {
          console.warn("히스토리 로드 에러:", error);
          showToast("이전 기록을 불러올 수 없습니다.");
        }
      };

      // [서버] 선택한 이전 기록으로 화면 복원
      const loadHistoryVersion = (historyItem) => {
        if(historyItem.projectInfo) setProjectInfo(historyItem.projectInfo);
        if(historyItem.todayDate) setTodayDate(historyItem.todayDate);
        if(historyItem.tasks) setTasks(historyItem.tasks);
        
        setIsHistoryModalOpen(false);
        showToast(`[v${historyItem.versionNum}] 버전의 이전 공정표를 불러왔습니다.`);
      };

      // [로컬] IndexedDB
      const saveToLocalDB = () => {
        const request = indexedDB.open("GanttDB", 1);
        request.onupgradeneeded = (e) => {
          const db = e.target.result;
          if (!db.objectStoreNames.contains("projects")) db.createObjectStore("projects", { keyPath: "id" });
        };
        request.onsuccess = (e) => {
          const db = e.target.result;
          if (!db.objectStoreNames.contains("projects")) return;
          const tx = db.transaction("projects", "readwrite");
          const store = tx.objectStore("projects");
          store.put({ id: "current_project", projectInfo, todayDate, tasks });
          tx.oncomplete = () => showToast('로컬 브라우저에 안전하게 저장되었습니다.');
        };
      };

      const loadFromLocalDB = () => {
        const request = indexedDB.open("GanttDB", 1);
        request.onsuccess = (e) => {
          const db = e.target.result;
          if (!db.objectStoreNames.contains("projects")) {
            showToast('저장된 로컬 데이터가 없습니다.');
            return;
          }
          const tx = db.transaction("projects", "readonly");
          const store = tx.objectStore("projects");
          const getReq = store.get("current_project");
          getReq.onsuccess = () => {
            if (getReq.result) {
              setProjectInfo(getReq.result.projectInfo);
              setTodayDate(getReq.result.todayDate);
              setTasks(getReq.result.tasks);
              showToast('로컬 브라우저에서 불러왔습니다.');
            } else {
              showToast('저장된 로컬 데이터가 없습니다.');
            }
          };
        };
      };

      // JSON 내보내기/불러오기
      const exportToJson = () => {
        const data = { projectInfo, todayDate, tasks };
        const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.download = `공정표_백업_${new Date().toISOString().split('T')[0]}.json`;
        link.click();
        URL.revokeObjectURL(url);
        showToast('공유용 백업 파일(.json)이 다운로드되었습니다.');
      };

      const importFromJson = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (event) => {
          try {
            const parsed = JSON.parse(event.target.result);
            if (parsed.projectInfo && parsed.tasks) {
              setProjectInfo(parsed.projectInfo);
              if (parsed.todayDate) setTodayDate(parsed.todayDate);
              setTasks(parsed.tasks);
              showToast('파일에서 공정 데이터를 성공적으로 적용했습니다.');
            } else {
              showToast('유효하지 않은 공정표 파일입니다.');
            }
          } catch (error) {
            showToast('파일을 읽는 중 오류가 발생했습니다.');
          }
        };
        reader.readAsText(file);
        e.target.value = ''; 
      };

      // 진행률 계산
      const calculateTaskProgress = (start, end, refDate) => {
        const s = dateToMs(start);
        const e = dateToMs(end);
        const r = dateToMs(refDate);
        if (s === 0 || e === 0 || e <= s) return 0;
        if (r <= s) return 0;
        if (r >= e) return 100;
        return parseFloat((((r - s) / (e - s)) * 100).toFixed(1));
      };

      // 4. 통계 및 데이터 처리
      const stats = useMemo(() => {
        const start = dateToMs(projectInfo.start);
        const end = dateToMs(projectInfo.end);
        
        const totalDays = Math.max(1, Math.ceil((end - start) / (1000 * 60 * 60 * 24)));

        const getAllSmallDescendants = (parentId) => {
          let results = [];
          const children = tasks.filter(t => t.parentId === parentId);
          children.forEach(c => {
            if (c.level === 2) results.push(c);
            else results = [...results, ...getAllSmallDescendants(c.id)];
          });
          return results;
        };

        const computeTree = (task) => {
          if (task.level === 2) {
            const prog = calculateTaskProgress(task.start, task.end, todayDate);
            return { 
              ...task, 
              progress: prog, 
              progAmount: (task.amount || 0) * (prog / 100) 
            };
          }
          
          const directChildren = tasks.filter(t => t.parentId === task.id);
          const childNodes = directChildren.map(computeTree);
          
          const smalls = getAllSmallDescendants(task.id);
          const totalAmt = smalls.reduce((sum, s) => sum + (s.amount || 0), 0);
          const totalProgAmt = smalls.reduce((sum, s) => {
            const p = calculateTaskProgress(s.start, s.end, todayDate);
            return sum + ((s.amount || 0) * (p / 100));
          }, 0);
          
          const validSmalls = smalls.filter(s => dateToMs(s.start) > 0 && dateToMs(s.end) > 0);
          
          const startMs = validSmalls.length > 0 ? Math.min(...validSmalls.map(s => dateToMs(s.start))) : dateToMs(projectInfo.start);
          const endMs = validSmalls.length > 0 ? Math.max(...validSmalls.map(s => dateToMs(s.end))) : dateToMs(projectInfo.end);

          return {
            ...task,
            amount: totalAmt,
            progAmount: totalProgAmt,
            progress: totalAmt > 0 ? parseFloat(((totalProgAmt / totalAmt) * 100).toFixed(1)) : 0,
            start: msToDate(startMs),
            end: msToDate(endMs),
            segments: validSmalls.map(s => ({ start: s.start, end: s.end })),
            children: childNodes
          };
        };

        const tree = tasks.filter(t => !t.parentId).map(computeTree);
        const totalAmount = tree.reduce((sum, t) => sum + t.amount, 0);
        const totalProgAmount = tree.reduce((sum, t) => sum + t.progAmount, 0);

        return {
          tree,
          overallProgress: totalAmount > 0 ? parseFloat(((totalProgAmount / totalAmount) * 100).toFixed(1)) : 0,
          totalAmount,
          totalProgAmount,
          totalDays,
          projectStartTime: start || dateToMs(new Date().getFullYear() + '-01-01'),
          projectEndTime: end || dateToMs(new Date().getFullYear() + '-12-31')
        };
      }, [tasks, todayDate, projectInfo]);

      // 5. 공정 추가 및 수정 로직
      const handleAddTask = (formData) => {
        const { name, start, end, amount } = formData;
        const baseId = Date.now().toString();

        let newEntries = [];
        if (modalMode === 'large') {
          const midId = baseId + '-M';
          const smallId = baseId + '-S';
          newEntries = [
            { id: baseId, name, level: 0, expanded: true },
            { id: midId, parentId: baseId, name: name, level: 1, expanded: true },
            { id: smallId, parentId: midId, name: name, level: 2, start, end, amount }
          ];
        } else if (modalMode === 'middle') {
          const smallId = baseId + '-S';
          newEntries = [
            { id: baseId, parentId: activeParentId, name, level: 1, expanded: true },
            { id: smallId, parentId: baseId, name: name, level: 2, start, end, amount }
          ];
        } else if (modalMode === 'small') {
          newEntries = [{ id: baseId, parentId: activeParentId, name, level: 2, start, end, amount }];
        }
        
        setTasks(prev => [...prev, ...newEntries]);
        setIsAdding(false);
        setNewTask({ name: '', start: projectInfo.start, end: projectInfo.end, amount: 0, parentId: '' });
      };

      const handleUpdateTask = () => {
        if (!editingTask) return;
        setTasks(prev => prev.map(t => t.id === editingTask.id ? editingTask : t));
        setEditingTask(null);
      };

      const toggleExpand = (id) => {
        setTasks(prev => prev.map(t => t.id === id ? { ...t, expanded: !t.expanded } : t));
      };

      const expandAll = () => {
        setTasks(prev => prev.map(t => ({ ...t, expanded: true })));
      };

      const collapseAll = () => {
        setTasks(prev => prev.map(t => ({ ...t, expanded: false })));
      };

      const handleMouseDown = (e, id, type) => {
        const task = tasks.find(t => t.id === id);
        if (!task) return;
        e.preventDefault();
        setDragState({ id, type, initialMouseX: e.clientX, initialStart: dateToMs(task.start), initialEnd: dateToMs(task.end) });
      };

      useEffect(() => {
        const handleMouseMove = (e) => {
          if (!dragState || !chartRef.current) return;
          const rect = chartRef.current.getBoundingClientRect();
          const totalDuration = stats.projectEndTime - stats.projectStartTime;
          
          if (rect.width === 0 || totalDuration === 0) return;

          const deltaMs = (e.clientX - dragState.initialMouseX) * (totalDuration / rect.width);
          if (isNaN(deltaMs)) return;

          const snappedDelta = Math.round(deltaMs / 86400000) * 86400000;

          setTasks(prev => prev.map(t => {
            if (t.id !== dragState.id) return t;
            let ns = dragState.initialStart, ne = dragState.initialEnd;
            
            if (isNaN(ns) || isNaN(ne)) return t;

            if (dragState.type === 'move') { ns += snappedDelta; ne += snappedDelta; }
            else if (dragState.type === 'start') ns += snappedDelta;
            else if (dragState.type === 'end') ne += snappedDelta;
            
            ns = Math.max(stats.projectStartTime, Math.min(ne - 86400000, ns));
            ne = Math.max(ns + 86400000, Math.min(stats.projectEndTime, ne));
            
            return { ...t, start: msToDate(ns), end: msToDate(ne) };
          }));
        };
        const handleUp = () => setDragState(null);
        if (dragState) {
          window.addEventListener('mousemove', handleMouseMove);
          window.addEventListener('mouseup', handleUp);
        }
        return () => { window.removeEventListener('mousemove', handleMouseMove); window.removeEventListener('mouseup', handleUp); };
      }, [dragState, stats]);

      const getPos = (d) => {
        const ms = dateToMs(d);
        if (ms === 0) return 0;
        const total = stats.projectEndTime - stats.projectStartTime;
        if (total === 0) return 0;
        return Math.max(0, Math.min(100, ((ms - stats.projectStartTime) / total) * 100));
      };

      const getLen = (s, e) => {
        const startMs = dateToMs(s);
        const endMs = dateToMs(e);
        if (startMs === 0 || endMs === 0) return 0;
        const total = stats.projectEndTime - stats.projectStartTime;
        if (total === 0) return 0;
        return ((endMs - startMs) / total) * 100;
      };

      const monthMarkers = useMemo(() => {
        let flatTasks = [];
        const getLeafs = (nodes) => {
            nodes.forEach(n => {
                if (n.level === 2) flatTasks.push(n);
                if (n.children) getLeafs(n.children);
            });
        };
        getLeafs(stats.tree);

        let rawMarkers = [];
        const startMs = stats.projectStartTime;
        const endMs = stats.projectEndTime;
        const totalDays = stats.totalDays;

        let curr = new Date(startMs);
        curr.setDate(1); 
        const end = new Date(endMs);
        
        if (isNaN(curr.getTime()) || isNaN(end.getTime()) || curr > end) return [];

        if (totalDays < 180) {
           while (curr <= end || (curr.getFullYear() === end.getFullYear() && curr.getMonth() === end.getMonth())) {
              const y = curr.getFullYear();
              const m = curr.getMonth();
              
              const d1 = new Date(y, m, 1);
              const p1End = new Date(y, m, 14);
              
              const d15 = new Date(y, m, 15);
              const p15End = new Date(y, m + 1, 0); 

              if (p1End.getTime() >= startMs && d1.getTime() <= endMs) {
                  rawMarkers.push({ 
                    label: `${m + 1}월 1일`, 
                    pos: getPos(msToDate(Math.max(d1.getTime(), startMs))),
                    pStart: d1.getTime(),
                    pEnd: p1End.getTime()
                  });
              }
              if (p15End.getTime() >= startMs && d15.getTime() <= endMs) {
                  rawMarkers.push({ 
                    label: `${m + 1}월 15일`, 
                    pos: getPos(msToDate(Math.max(d15.getTime(), startMs))),
                    pStart: d15.getTime(),
                    pEnd: p15End.getTime()
                  });
              }
              curr.setMonth(curr.getMonth() + 1);
           }
        } else {
           while (curr <= end || (curr.getFullYear() === end.getFullYear() && curr.getMonth() === end.getMonth())) {
              const y = curr.getFullYear();
              const m = curr.getMonth();
              const d1 = new Date(y, m, 1);
              const pEnd = new Date(y, m + 1, 0);

              if (pEnd.getTime() >= startMs && d1.getTime() <= endMs) {
                  const yearShort = String(y).slice(2);
                  rawMarkers.push({ 
                    label: `${yearShort}년 ${m + 1}월`, 
                    pos: getPos(msToDate(Math.max(d1.getTime(), startMs))),
                    pStart: d1.getTime(),
                    pEnd: pEnd.getTime()
                  });
              }
              curr.setMonth(curr.getMonth() + 1);
           }
        }

        return rawMarkers.map(marker => {
           let periodAmount = 0;
           flatTasks.forEach(t => {
               const tStart = dateToMs(t.start);
               const tEnd = dateToMs(t.end);
               
               if (tStart <= marker.pEnd && tEnd >= marker.pStart) {
                   const overlapStart = Math.max(tStart, marker.pStart);
                   const overlapEnd = Math.min(tEnd, marker.pEnd);
                   const overlapDays = Math.round((overlapEnd - overlapStart) / 86400000) + 1;
                   const totalTaskDays = Math.round((tEnd - tStart) / 86400000) + 1;
                   
                   if (totalTaskDays > 0) {
                       periodAmount += ((t.amount || 0) / totalTaskDays) * overlapDays;
                   }
               }
           });
           return { ...marker, amount: Math.round(periodAmount) };
        });
      }, [stats.projectStartTime, stats.projectEndTime, stats.totalDays, stats.tree]);

      // 6. 엑셀 출력
      const exportExcel = () => {
        const dayMs = 86400000;
        const intervals = [];
        let current = stats.projectStartTime;

        if (exportInterval === '1day') {
          while (current <= stats.projectEndTime) {
            intervals.push({ start: current, end: current + dayMs });
            current += dayMs;
          }
        } else if (exportInterval === '5days') {
          intervals.push({ start: current, end: current + dayMs }); 
          
          const getNextStd5 = (ms) => {
            let d = new Date(ms);
            let date = d.getDate();
            let nextDate = 0;
            if (date < 5) nextDate = 5;
            else if (date < 10) nextDate = 10;
            else if (date < 15) nextDate = 15;
            else if (date < 20) nextDate = 20;
            else if (date < 25) nextDate = 25;
            else nextDate = 1; 

            let nextD = new Date(d);
            if (nextDate === 1) nextD.setMonth(d.getMonth() + 1);
            nextD.setDate(nextDate);
            return nextD.getTime();
          };

          let next = getNextStd5(current);
          if (next <= current) {
             next = getNextStd5(current + dayMs);
          }
          intervals[0].end = next; 
          current = next;

          while (current <= stats.projectEndTime) {
            let nextStd = getNextStd5(current);
            intervals.push({ start: current, end: nextStd });
            current = nextStd;
          }

        } else if (exportInterval === '7days') {
          intervals.push({ start: current, end: current + dayMs });
          let d = new Date(current);
          let daysUntilMon = (8 - d.getDay()) % 7;
          if (daysUntilMon === 0) daysUntilMon = 7;
          current += daysUntilMon * dayMs;
          while (current <= stats.projectEndTime) {
            intervals.push({ start: current, end: Math.min(current + (7 * dayMs), stats.projectEndTime + dayMs) });
            current += 7 * dayMs;
          }
        } else {
          intervals.push({ start: current, end: current + dayMs });
          const getNextStd = (ms) => {
            let d = new Date(ms);
            let y = d.getFullYear(), m = d.getMonth(), date = d.getDate();
            if (date < 1) return new Date(y, m, 1).getTime();
            if (date < 11) return new Date(y, m, 11).getTime();
            if (date < 21) return new Date(y, m, 21).getTime();
            return new Date(y, m + 1, 1).getTime();
          };
          let next = getNextStd(current);
          if (next === current) {
            let d = new Date(current);
            let date = d.getDate();
            if (date === 1) next = new Date(d.getFullYear(), d.getMonth(), 11).getTime();
            else if (date === 11) next = new Date(d.getFullYear(), d.getMonth(), 21).getTime();
            else next = new Date(d.getFullYear(), d.getMonth() + 1, 1).getTime();
          }
          intervals[0].end = next; 
          current = next;

          while (current <= stats.projectEndTime) {
            let nextStd = getNextStd(current);
            intervals.push({ start: current, end: nextStd });
            current = nextStd;
          }
        }

        const tableStyle = 'border-collapse: collapse; font-family: "Malgun Gothic", sans-serif; font-size: 11px;';
        const headerStyle = 'background-color: #f1f5f9; border: 1px solid #94a3b8; padding: 6px; font-weight: bold; text-align: center;';
        const cellStyle = 'border: 1px solid #cbd5e1; padding: 4px; text-align: center;';

        const flattenTree = (nodes) => {
            let flat = [];
            nodes.forEach(node => {
                flat.push(node);
                if (node.children) flat = flat.concat(flattenTree(node.children));
            });
            return flat;
        };
        const allCalculatedTasks = flattenTree(stats.tree);

        let filteredTasks = allCalculatedTasks;
        if (exportScope === 'large') filteredTasks = allCalculatedTasks.filter(t => t.level === 0);
        else if (exportScope === 'middle') filteredTasks = allCalculatedTasks.filter(t => t.level === 1);
        else if (exportScope === 'small') filteredTasks = allCalculatedTasks.filter(t => t.level === 2);

        const totalFilteredAmount = filteredTasks.reduce((sum, t) => sum + (t.amount || 0), 0);

        let html = `
          <html><head><meta charset="utf-8"></head><body>
            <table border="1" style="${tableStyle}">
              <tr><th colspan="${intervals.length + 5}" style="font-size: 22px; padding: 15px; border: none; text-align: center;">공 정 표 (${exportScope === 'all' ? '전체' : exportScope === 'large' ? '대분류' : exportScope === 'middle' ? '중분류' : '소분류'})</th></tr>
              <tr><td colspan="${intervals.length + 5}" style="font-size: 13px; font-weight: bold; border: none; text-align: left;">공사명: ${projectInfo.name}</td></tr>
              <tr><td colspan="${intervals.length + 5}" style="font-size: 12px; font-weight: bold; border: none; text-align: left;">공사기간: ${projectInfo.start} ~ ${projectInfo.end}</td></tr>
              <tr><td colspan="${intervals.length + 5}" style="font-size: 12px; border: none; text-align: left; color: blue;">선택된 분류 총 순공사금액: ${totalFilteredAmount.toLocaleString()}원</td></tr>
              <tr><td colspan="${intervals.length + 5}" style="border: none;">&nbsp;</td></tr>
              <thead>
                <tr>
                  <th rowspan="2" style="${headerStyle} width: 250px;">공종항목명</th>
                  <th rowspan="2" style="${headerStyle} width: 90px;">시작일</th>
                  <th rowspan="2" style="${headerStyle} width: 90px;">종료일</th>
                  <th rowspan="2" style="${headerStyle} width: 100px;">순공사금액</th>
                  <th rowspan="2" style="${headerStyle} width: 60px;">진척</th>
                  <th colspan="${intervals.length}" style="${headerStyle}">타임라인</th>
                </tr>
                <tr>
                  ${intervals.map(int => `<th style="${headerStyle} font-size: 9px;">${new Date(int.start).getMonth()+1}/${new Date(int.start).getDate()}</th>`).join('')}
                </tr>
              </thead>
              <tbody>
                ${filteredTasks.map(task => {
                  const weight = task.level === 0 ? 'bold' : task.level === 1 ? 'normal' : 'italic';
                  const indent = task.level === 0 ? '' : task.level === 1 ? '&nbsp;&nbsp;' : '&nbsp;&nbsp;&nbsp;&nbsp;';
                  
                  let tS = 0, tE = 0;
                  if (task.level === 2) {
                     tS = dateToMs(task.start); tE = dateToMs(task.end);
                  } else if (task.segments && task.segments.length > 0) {
                     const segStarts = task.segments.map(s => dateToMs(s.start)).filter(d => d > 0);
                     const segEnds = task.segments.map(s => dateToMs(s.end)).filter(d => d > 0);
                     if (segStarts.length) tS = Math.min(...segStarts);
                     if (segEnds.length) tE = Math.max(...segEnds);
                  }

                  return `
                    <tr>
                      <td style="${cellStyle} text-align: left; font-weight: ${weight === 'italic' ? 'normal' : weight}; font-style: ${weight === 'italic' ? 'italic' : 'normal'}">${indent}${task.name}</td>
                      <td style="${cellStyle}">${tS > 0 ? msToDate(tS) : '-'}</td>
                      <td style="${cellStyle}">${tE > 0 ? msToDate(tE) : '-'}</td>
                      <td style="${cellStyle}">${(task.amount || 0).toLocaleString()}</td>
                      <td style="${cellStyle}">${isNaN(task.progress) ? 0 : task.progress}%</td>
                      ${intervals.map(int => {
                        let isOverlap = false;
                        if (task.level === 2) {
                           isOverlap = tS > 0 && tE > 0 && (tS < int.end && tE >= int.start);
                        } else if (task.segments) {
                           isOverlap = task.segments.some(seg => {
                              const sS = dateToMs(seg.start); const sE = dateToMs(seg.end);
                              return sS > 0 && sE > 0 && (sS < int.end && sE >= int.start);
                           });
                        }

                        if (isOverlap) {
                          const color = task.level === 0 ? '#3b82f6' : task.level === 1 ? '#94a3b8' : '#22c55e';
                          return `<td style="${cellStyle} background-color: ${color}; color: ${color};">■</td>`;
                        }
                        return `<td style="${cellStyle} background-color: #f8fafc;"></td>`;
                      }).join('')}
                    </tr>
                  `;
                }).join('')}
              </tbody>
            </table>
          ${'</bo' + 'dy></ht' + 'ml>'}
        `;

        const blob = new Blob([html], { type: 'application/vnd.ms-excel' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.href = url;
        link.download = `공정표_${exportScope}_${exportInterval}.xls`;
        link.click();
        URL.revokeObjectURL(url);
      };

      const renderRows = (nodes, depth = 0) => {
        let result = [];
        
        const getLeafs = (node) => {
            let leafs = [];
            if (node.level === 2) return [node];
            if (node.children) {
                node.children.forEach(child => {
                    leafs = [...leafs, ...getLeafs(child)];
                });
            }
            return leafs;
        };

        nodes.forEach(node => {
          const barColorClass = node.level === 0 ? 'bg-blue-200 border-blue-300' : node.level === 1 ? 'bg-gray-200 border-gray-300' : 'bg-green-100 border-green-200';
          const progressColorClass = node.level === 0 ? 'bg-blue-600' : node.level === 1 ? 'bg-gray-500' : 'bg-green-500';
          const segmentColorClass = node.level === 0 ? 'bg-blue-400/40 border-blue-300' : node.level === 1 ? 'bg-gray-400/40 border-gray-300' : '';

          const leafNodes = getLeafs(node);
          const isSingular = node.level === 2 || leafNodes.length === 1;
          const targetId = node.level === 2 ? node.id : (isSingular ? leafNodes[0].id : null);

          let interactiveBarClass = '';
          if (isSingular) {
              if (node.level === 0) interactiveBarClass = 'bg-blue-500 border-blue-400 cursor-grab active:cursor-grabbing z-10';
              else if (node.level === 1) interactiveBarClass = 'bg-gray-500 border-gray-400 cursor-grab active:cursor-grabbing z-10';
              else interactiveBarClass = 'bg-green-500 border-green-400 cursor-grab active:cursor-grabbing z-10';
          }

          result.push(
            <div key={node.id} className="flex items-center group">
              <div className="w-[550px] flex-shrink-0 pr-6 flex items-center" style={{ paddingLeft: `${depth * 32}px` }}>
                <div className="flex-1 min-w-0">
                  <div className="flex items-center gap-3 mb-1.5">
                    {node.level < 2 ? (
                      <button onClick={() => toggleExpand(node.id)} className="p-1 text-slate-400 hover:text-blue-600 hover:bg-blue-50 rounded-md transition-all select-none">
                        {node.expanded ? <Icon name="ChevronDown" size={20} /> : <Icon name="ChevronRight" size={20} />}
                      </button>
                    ) : <div className="w-8" />}
                    <span className={`truncate tracking-tight ${node.level === 0 ? 'font-black text-blue-900 text-base' : node.level === 1 ? 'font-bold text-slate-700 text-sm' : 'text-slate-600 font-medium text-xs'}`}>
                      {typeof node.name === 'string' ? node.name : 'Unknown Task'}
                    </span>
                    
                    <div className="flex gap-2 ml-auto shrink-0 opacity-0 group-hover:opacity-100 transition-opacity">
                      {node.level === 0 && (
                        <button onClick={() => { setModalMode('middle'); setActiveParentId(node.id); setIsAdding(true); }} className="text-[10px] bg-blue-50 text-blue-600 px-2 py-1 rounded-md font-bold hover:bg-blue-100 transition-colors shadow-sm">
                          + 중분류 추가
                        </button>
                      )}
                      {node.level === 1 && (
                        <button onClick={() => { setModalMode('small'); setActiveParentId(node.id); setIsAdding(true); }} className="text-[10px] bg-indigo-50 text-indigo-600 px-2 py-1 rounded-md font-bold hover:bg-indigo-100 transition-colors shadow-sm">
                          + 소분류 추가
                        </button>
                      )}
                      {node.level === 2 && (
                        <button onClick={() => setEditingTask(node)} className="p-1.5 bg-slate-50 text-slate-400 hover:text-blue-600 rounded-md transition-all shadow-sm"><Icon name="Settings" size={14} /></button>
                      )}
                      <button onClick={() => setTasks(prev => prev.filter(t => !t.id.startsWith(node.id)))} className="p-1.5 bg-red-50 text-red-400 hover:text-red-600 rounded-md transition-all shadow-sm"><Icon name="Trash2" size={14} /></button>
                    </div>
                  </div>
                  <div className="flex items-center gap-3">
                    <div className="flex-1 h-2 bg-slate-100 rounded-full overflow-hidden shadow-inner">
                      <div className={`h-full transition-all duration-700 ${progressColorClass}`} style={{ width: `${isNaN(node.progress) ? 0 : node.progress}%` }} />
                    </div>
                    <div className="flex flex-col items-end min-w-[60px]">
                       <span className="text-[10px] font-black text-slate-600">{isNaN(node.progress) ? 0 : node.progress}%</span>
                       <span className="text-[9px] font-bold text-slate-400">{(node.amount || 0).toLocaleString()}원</span>
                    </div>
                  </div>
                </div>
              </div>

              <div className={`flex-1 relative h-16 rounded-2xl border transition-all ${node.level < 2 ? 'bg-slate-50/50' : 'bg-white group-hover:bg-blue-50/10 shadow-sm'}`}>
                {isSingular ? (
                  <div 
                    className={`absolute h-[65%] top-[17.5%] rounded-xl shadow-xl flex items-center border ${interactiveBarClass}`}
                    style={{ left: `${getPos(node.start)}%`, width: `${getLen(node.start, node.end)}%` }}
                    onMouseDown={e => handleMouseDown(e, targetId, 'move')}
                  >
                    <div className="absolute left-0 top-0 bottom-0 w-4 cursor-ew-resize rounded-l-xl hover:bg-white/20" onMouseDown={e => { e.stopPropagation(); handleMouseDown(e, targetId, 'start'); }} onDoubleClick={e => { e.stopPropagation(); setQuickDateEdit({ id: targetId, field: 'start', x: e.clientX, y: e.clientY }); }} />
                    <div className="absolute right-0 top-0 bottom-0 w-4 cursor-ew-resize rounded-r-xl hover:bg-white/20" onMouseDown={e => { e.stopPropagation(); handleMouseDown(e, targetId, 'end'); }} onDoubleClick={e => { e.stopPropagation(); setQuickDateEdit({ id: targetId, field: 'end', x: e.clientX, y: e.clientY }); }} />
                    <span className="w-full text-[10px] font-black text-white px-3 truncate text-center drop-shadow-md pointer-events-none">{node.name}</span>
                  </div>
                ) : (
                  node.segments?.map((seg, si) => (
                    <div key={si} className={`absolute h-[45%] top-[27.5%] rounded-lg border flex items-center justify-center transition-all ${segmentColorClass}`} style={{ left: `${getPos(seg.start)}%`, width: `${getLen(seg.start, seg.end)}%` }}>
                       <span className="text-[9px] font-black text-slate-600 truncate px-2 opacity-80 select-none">{node.name}</span>
                    </div>
                  ))
                )}
              </div>
            </div>
          );

          if (node.expanded && node.children && node.children.length > 0) {
            result.push(...renderRows(node.children, depth + 1));
          }
        });
        return result;
      };

      return (
        <div className="min-h-screen bg-slate-50 p-4 md:p-8 font-sans text-slate-900 relative">
          <div className="w-full max-w-full px-4 lg:px-8 space-y-6">
            
            {/* 경고 문구 배너 (로컬 모드일 때만 표시) */}
            {!isServerMode && (
              <div className="bg-red-50 border border-red-200 text-red-600 px-6 py-4 rounded-2xl flex items-center gap-3 font-bold shadow-sm">
                <Icon name="AlertTriangle" size={20} className="text-red-500 shrink-0" />
                <span>해당 자료는 서버 어디에도 저장되지 않습니다. 반드시 엑셀로 내보내기 기능을 활용하여 자료 저장을 하셔야합니다. (JSON파일 다운로드시 추후 다시 활용 가능)</span>
              </div>
            )}

            {/* 상단 모드 전환 및 데이터 컨트롤 */}
            <div className="bg-white p-5 rounded-3xl shadow-sm border border-slate-200 flex flex-col lg:flex-row gap-4 justify-between items-center tracking-tight select-none">
              
              {/* 모드 전환 토글 */}
              <div className="flex items-center gap-4 bg-slate-50 p-2 rounded-2xl border border-slate-100">
                <button 
                  onClick={handleLocalModeClick}
                  className={`flex items-center gap-2 px-5 py-2.5 rounded-xl font-black text-sm transition-all ${!isServerMode ? 'bg-white text-slate-800 shadow-md' : 'text-slate-400 hover:text-slate-600'}`}
                >
                  <Icon name="Database" size={16} /> 로컬 모드
                </button>
                <button 
                  onClick={handleServerModeClick}
                  className={`flex items-center gap-2 px-5 py-2.5 rounded-xl font-black text-sm transition-all ${isServerMode ? 'bg-blue-600 text-white shadow-md shadow-blue-200' : 'text-slate-400 hover:text-slate-600'}`}
                >
                  <Icon name="Cloud" size={16} /> 서버 연동 모드
                </button>
              </div>

              {/* 저장/불러오기 (모드에 따라 동적 변경) */}
              <div className="flex flex-wrap items-center gap-3">
                {isServerMode ? (
                  <div className="flex items-center gap-3">
                    <button onClick={handleOpenSearch} className="flex items-center gap-1.5 px-4 py-2.5 bg-blue-50 border border-blue-200 hover:bg-blue-100 text-blue-700 text-xs font-black rounded-xl transition-all">
                      <Icon name="Search" size={14} /> 프로젝트 연동 검색
                    </button>
                    <div className="h-6 w-px bg-slate-200 mx-2"></div>
                    <button onClick={handleSave} className="flex items-center gap-1.5 px-4 py-2.5 bg-blue-600 hover:bg-blue-700 text-white text-xs font-black rounded-xl transition-all shadow-sm">
                      <Icon name="CloudUpload" size={14} /> 서버에 동시 저장 (공정+예산)
                    </button>
                    <button onClick={fetchHistoryList} className="flex items-center gap-1.5 px-4 py-2.5 bg-slate-50 border border-slate-200 hover:bg-slate-100 text-slate-700 text-xs font-black rounded-xl transition-all">
                      <Icon name="History" size={14} /> 해당 현장의 이전 기록 가져오기
                    </button>
                  </div>
                ) : (
                  <div className="flex items-center gap-3">
                    <button onClick={handleSave} className="flex items-center gap-1.5 px-4 py-2.5 bg-slate-50 border-2 border-slate-100 hover:bg-slate-100 text-slate-700 text-xs font-black rounded-xl transition-all">
                      <Icon name="Save" size={14} /> 내 PC에 저장
                    </button>
                    <button onClick={handleLoad} className="flex items-center gap-1.5 px-4 py-2.5 bg-slate-50 border-2 border-slate-100 hover:bg-slate-100 text-slate-700 text-xs font-black rounded-xl transition-all">
                      <Icon name="FolderOpen" size={14} /> 내 PC에서 불러오기
                    </button>
                    <div className="h-6 w-px bg-slate-200 mx-2"></div>
                    <button onClick={exportToJson} className="flex items-center gap-1.5 px-4 py-2.5 bg-blue-50 border border-blue-200 hover:bg-blue-100 text-blue-700 text-xs font-black rounded-xl transition-all">
                      .json 다운로드
                    </button>
                    <label className="flex items-center gap-1.5 px-4 py-2.5 bg-blue-50 border border-blue-200 hover:bg-blue-100 text-blue-700 text-xs font-black rounded-xl transition-all cursor-pointer">
                      <Icon name="Upload" size={14} /> 파일 업로드
                      <input type="file" accept=".json" className="hidden" onChange={importFromJson} />
                    </label>
                  </div>
                )}
              </div>
            </div>

            {/* Header */}
            <header className="bg-white p-6 rounded-3xl shadow-sm border border-slate-200 flex flex-col xl:flex-row justify-between gap-6 tracking-tight select-none">
              <div className="space-y-4 flex-1">
                <div className="flex items-center gap-4">
                  <div className={`p-3 rounded-2xl text-white shadow-xl ${isServerMode ? 'bg-blue-600 shadow-blue-100' : 'bg-slate-600 shadow-slate-200'}`}>
                    <Icon name={isServerMode ? "Server" : "Building2"} size={24} />
                  </div>
                  <div className="flex-1">
                    {isServerMode && <p className="text-[10px] font-black text-blue-500 uppercase tracking-widest mb-1 ml-1">Connected Project {currentUser && `(👤 ${currentUser.email})`}</p>}
                    <input 
                      value={projectInfo.name} 
                      onChange={e => setProjectInfo({...projectInfo, name: e.target.value})} 
                      disabled={isServerMode}
                      placeholder={isServerMode ? "프로젝트 연동 검색을 진행해주세요" : "프로젝트명을 입력하세요"}
                      className={`text-2xl lg:text-3xl font-black bg-transparent border-b-2 border-transparent outline-none w-full transition-all ${isServerMode ? 'text-slate-500 cursor-not-allowed' : 'text-slate-900 hover:border-slate-200 focus:border-blue-500'}`} 
                    />
                  </div>
                </div>
                <div className="flex flex-wrap gap-4 text-sm font-bold">
                  <div className="bg-slate-50 px-4 py-2 rounded-xl border flex items-center gap-3 shadow-sm hover:bg-slate-100 transition-colors">
                    <Icon name="Calendar" size={16} className="text-slate-400" />
                    <input type="date" value={projectInfo.start} onChange={e => setProjectInfo({...projectInfo, start: e.target.value})} className="bg-transparent text-blue-600 outline-none cursor-pointer" disabled={isServerMode && selectedProjectId} />
                    <span className="text-slate-300">~</span>
                    <input type="date" value={projectInfo.end} onChange={e => setProjectInfo({...projectInfo, end: e.target.value})} className="bg-transparent text-red-600 outline-none cursor-pointer" disabled={isServerMode && selectedProjectId} />
                  </div>
                  <div className="bg-blue-50 px-4 py-2 rounded-xl border border-blue-100 flex items-center gap-3 shadow-sm">
                    <Icon name="Clock" size={16} className="text-blue-500" />
                    <span className="text-blue-600">기준일:</span>
                    <input type="date" value={todayDate} onChange={e => setTodayDate(e.target.value)} className="bg-transparent font-black text-blue-800 outline-none cursor-pointer" />
                  </div>
                </div>
              </div>
              <div className="flex flex-col gap-3 min-w-[340px]">
                <div className="bg-emerald-50 p-4 rounded-2xl border border-emerald-100 shadow-sm">
                   <div className="flex items-center gap-2 mb-3 px-1"><Icon name="ListFilter" size={14} className="text-emerald-600" /><span className="text-[10px] font-black text-emerald-600 uppercase">Excel Configuration</span></div>
                   <div className="flex gap-2">
                     <select value={exportScope} onChange={e => setExportScope(e.target.value)} className="flex-1 bg-white border border-emerald-200 text-[10px] font-black p-2 rounded-lg outline-none cursor-pointer">
                        <option value="all">전체 출력</option>
                        <option value="large">대분류만</option>
                        <option value="middle">중분류만</option>
                        <option value="small">소분류만</option>
                     </select>
                     <select value={exportInterval} onChange={e => setExportInterval(e.target.value)} className="flex-1 bg-white border border-emerald-200 text-[10px] font-black p-2 rounded-lg outline-none cursor-pointer">
                        <option value="1day">1일 간격</option>
                        <option value="5days">5일 간격</option>
                        <option value="7days">7일 간격</option>
                        <option value="10days">10일 간격</option>
                     </select>
                     <button onClick={exportExcel} className="bg-emerald-600 text-white p-2 rounded-lg shadow-lg shadow-emerald-200 hover:bg-emerald-700 transition-colors"><Icon name="Download" size={18} /></button>
                   </div>
                </div>
                <button onClick={() => { setModalMode('large'); setIsAdding(true); }} className="bg-blue-600 text-white py-4 rounded-2xl font-black shadow-xl shadow-blue-100 flex items-center justify-center gap-2 hover:bg-blue-700 transition-all active:scale-95"><Icon name="Plus" size={18} /> 새 공정(대분류) 추가</button>
              </div>
            </header>

            {/* Dashboard Stats */}
            <div className="grid grid-cols-1 md:grid-cols-3 gap-6 select-none">
              <div className="bg-white p-6 rounded-[2rem] border border-slate-200 shadow-sm flex items-center gap-5">
                <div className="bg-blue-50 p-4 rounded-2xl text-blue-600"><Icon name="TrendingUp" size={24} /></div>
                <div><p className="text-xs text-slate-400 font-black uppercase tracking-widest">현재 공정률</p><p className="text-3xl font-black text-blue-600 tracking-tight">{isNaN(stats.overallProgress) ? 0 : stats.overallProgress}%</p></div>
              </div>
              <div className="bg-white p-6 rounded-[2rem] border border-slate-200 shadow-sm flex items-center gap-5">
                <div className="bg-green-50 p-4 rounded-2xl text-green-600"><Icon name="DollarSign" size={24} /></div>
                <div><p className="text-xs text-slate-400 font-black uppercase tracking-widest">순공사금액</p><p className="text-2xl font-black tracking-tighter">{stats.totalAmount.toLocaleString()}원</p></div>
              </div>
              <div className="bg-white p-6 rounded-[2rem] border border-slate-200 shadow-sm flex items-center gap-5">
                <div className="bg-amber-50 p-4 rounded-2xl text-amber-600"><Icon name="Calendar" size={24} /></div>
                <div><p className="text-xs text-slate-400 font-black uppercase tracking-widest">잔여 일수</p><p className="text-3xl font-black tracking-tight">{Math.max(0, Math.ceil((stats.projectEndTime - dateToMs(todayDate))/86400000))}일</p></div>
              </div>
            </div>

            {/* Gantt Chart Section */}
            <div className="bg-white rounded-[2.5rem] border border-slate-200 shadow-sm overflow-hidden">
              <div className="p-8 border-b border-slate-50 bg-slate-50/10 flex flex-col sm:flex-row sm:items-center justify-between gap-4 select-none">
                <div>
                  <h2 className="text-2xl lg:text-3xl font-black text-slate-800 tracking-tight">현재진척예상금액 : {(stats.totalProgAmount || 0).toLocaleString(undefined, { maximumFractionDigits: 0 })}원</h2>
                  <div className="flex gap-2 mt-3">
                    <button onClick={expandAll} className="text-[11px] bg-white border border-slate-200 text-slate-600 px-3 py-1.5 rounded-lg font-bold hover:bg-slate-50 transition-colors shadow-sm active:scale-95">
                      모두 펼치기
                    </button>
                    <button onClick={collapseAll} className="text-[11px] bg-white border border-slate-200 text-slate-600 px-3 py-1.5 rounded-lg font-bold hover:bg-slate-50 transition-colors shadow-sm active:scale-95">
                      모두 접기
                    </button>
                  </div>
                </div>
              </div>
              
              <div className="overflow-x-auto p-8 pt-32" ref={chartRef}>
                <div className="min-w-[1400px]">
                  {/* Ruler & Expected Period Amount */}
                  <div className="relative h-14 mb-10 border-b flex items-end select-none">
                    <div className="w-[550px] flex-shrink-0 font-black text-slate-300 text-[10px] pb-4 uppercase tracking-[0.2em]">Classification & Timeline</div>
                    <div className="flex-1 relative h-full">
                      {monthMarkers.map((m, i) => (
                        <div key={i} className="absolute top-0 border-l h-full border-slate-200" style={{ left: `${m.pos}%` }}>
                          <div className="absolute -top-[4rem] -translate-x-1/2 flex flex-col items-center">
                            <span className="text-[11px] font-black text-slate-500 bg-white px-1.5 whitespace-nowrap">{m.label}</span>
                            <span className="text-[9px] font-black text-blue-600 bg-blue-50/80 px-2 py-0.5 rounded-md whitespace-nowrap mt-1 shadow-sm border border-blue-100">{m.amount.toLocaleString()}원</span>
                          </div>
                        </div>
                      ))}
                      <div className="absolute top-0 bottom-0 border-l-2 border-dashed border-red-400 z-40 pointer-events-none" style={{ left: `${getPos(todayDate)}%` }}>
                        <div className="absolute -top-[5rem] -translate-x-1/2 bg-red-500 text-white text-[10px] font-black px-3 py-1.5 rounded-full shadow-lg z-50">기준일</div>
                      </div>
                    </div>
                  </div>

                  {/* Rows List */}
                  <div className="space-y-4 pb-20">
                    {renderRows(stats.tree)}
                  </div>
                </div>
              </div>
            </div>

            {/* Toast Message */}
            {toastMsg && (
              <div className="fixed bottom-10 left-1/2 -translate-x-1/2 bg-slate-800 text-white px-8 py-4 rounded-2xl shadow-2xl z-[300] font-bold animate-in fade-in slide-in-from-bottom-5">
                {toastMsg}
              </div>
            )}

            {/* Quick Date Edit Tooltip */}
            {quickDateEdit && (
              <div 
                className="fixed bg-slate-800 text-white p-4 rounded-2xl shadow-2xl z-[200] border border-slate-600"
                style={{ left: quickDateEdit.x - 100, top: quickDateEdit.y + 20 }}
              >
                <div className="flex flex-col gap-2">
                  <label className="text-[10px] font-black uppercase tracking-widest text-slate-400">{quickDateEdit.field === 'start' ? '시작일 변경' : '종료일 변경'}</label>
                  <div className="flex items-center gap-2">
                    <input 
                      type="date" 
                      className="bg-slate-700 text-sm font-bold border-none rounded-lg px-2 py-1.5 focus:ring-2 focus:ring-blue-500 outline-none text-white"
                      value={tasks.find(t => t.id === quickDateEdit.id)?.[quickDateEdit.field] || ''}
                      onChange={(e) => {
                        setTasks(prev => prev.map(t => t.id === quickDateEdit.id ? { ...t, [quickDateEdit.field]: e.target.value } : t));
                      }}
                    />
                    <button onClick={() => setQuickDateEdit(null)} className="p-1 hover:bg-slate-600 rounded-lg transition-colors"><Icon name="X" size={16} /></button>
                  </div>
                </div>
              </div>
            )}

            {/* 신규/수정 모달 */}
            {(isAdding || editingTask) && (
              <div className="fixed inset-0 bg-slate-900/70 backdrop-blur-md z-[100] flex items-center justify-center p-4">
                <div className="bg-white rounded-[2.5rem] w-full max-w-lg shadow-2xl p-10 space-y-8 border border-white/20">
                  <div className="flex justify-between items-center">
                    <h3 className="text-3xl font-black tracking-tighter text-slate-800">
                      {editingTask ? '공정 상세 수정' : `신규 ${modalMode === 'large' ? '대분류' : modalMode === 'middle' ? '중분류' : '소분류'} 등록`}
                    </h3>
                    <button onClick={() => { setIsAdding(false); setEditingTask(null); }} className="p-2 hover:bg-slate-100 rounded-full transition-colors"><Icon name="X" size={24} className="text-slate-400" /></button>
                  </div>
                  
                  <div className="space-y-6">
                    <div className="space-y-2">
                      <label className="text-[11px] font-black text-slate-400 uppercase tracking-widest ml-1">공종 항목 명칭</label>
                      <input placeholder="공종명 입력" className="w-full p-5 bg-slate-50 border-2 border-slate-100 rounded-[1.25rem] font-black text-lg outline-none focus:border-blue-500 focus:bg-white transition-all shadow-inner" 
                        value={(editingTask ? editingTask.name : newTask.name) || ''} 
                        onChange={e => editingTask ? setEditingTask({...editingTask, name: e.target.value}) : setNewTask({...newTask, name: e.target.value})} 
                      />
                    </div>
                    
                    <div className="grid grid-cols-2 gap-6">
                      <div className="space-y-2">
                        <label className="text-[11px] font-black text-blue-400 uppercase tracking-widest ml-1">시작 예정일</label>
                        <input type="date" className="w-full p-5 bg-slate-50 border-2 border-slate-100 rounded-[1.25rem] font-bold outline-none focus:border-blue-500 focus:bg-white transition-all shadow-inner" 
                          value={(editingTask ? editingTask.start : newTask.start) || ''} 
                          onChange={e => editingTask ? setEditingTask({...editingTask, start: e.target.value}) : setNewTask({...newTask, start: e.target.value})} 
                        />
                      </div>
                      <div className="space-y-2">
                        <label className="text-[11px] font-black text-red-400 uppercase tracking-widest ml-1">종료 예정일</label>
                        <input type="date" className="w-full p-5 bg-slate-50 border-2 border-slate-100 rounded-[1.25rem] font-bold outline-none focus:border-blue-500 focus:bg-white transition-all shadow-inner" 
                          value={(editingTask ? editingTask.end : newTask.end) || ''} 
                          onChange={e => editingTask ? setEditingTask({...editingTask, end: e.target.value}) : setNewTask({...newTask, end: e.target.value})} 
                        />
                      </div>
                    </div>
                    
                    <div className="space-y-2">
                      <label className="text-[11px] font-black text-emerald-400 uppercase tracking-widest ml-1">순공사금액 (원)</label>
                      <input type="number" placeholder="금액 입력" className="w-full p-5 bg-slate-50 border-2 border-slate-100 rounded-[1.25rem] font-black text-xl outline-none focus:border-blue-500 focus:bg-white transition-all shadow-inner" 
                        value={(editingTask ? editingTask.amount : newTask.amount) || 0} 
                        onChange={e => editingTask ? setEditingTask({...editingTask, amount: Number(e.target.value)}) : setNewTask({...newTask, amount: Number(e.target.value)})} 
                      />
                    </div>
                  </div>

                  <div className="flex gap-4 pt-4">
                    <button onClick={() => { setIsAdding(false); setEditingTask(null); }} className="flex-1 py-5 font-black text-slate-500 bg-slate-100 rounded-3xl hover:bg-slate-200 transition-all active:scale-95">취소</button>
                    <button onClick={() => editingTask ? handleUpdateTask() : handleAddTask(newTask)} className="flex-1 py-5 bg-blue-600 text-white rounded-3xl font-black shadow-[0_20px_40px_-10px_rgba(37,99,235,0.4)] hover:bg-blue-700 transition-all active:scale-95">
                      {editingTask ? '수정사항 반영' : '공정 등록 완료'}
                    </button>
                  </div>
                </div>
              </div>
            )}

            {/* 서버 프로젝트 검색 모달 */}
            {isSearchModalOpen && (
              <div className="fixed inset-0 bg-slate-900/70 backdrop-blur-md z-[150] flex items-center justify-center p-4 animate-in fade-in duration-300">
                <div className="bg-white rounded-[2.5rem] w-full max-w-2xl shadow-2xl p-8 flex flex-col max-h-[80vh]">
                  <div className="flex justify-between items-center mb-6">
                    <div>
                      <h3 className="text-2xl font-black text-slate-800">서버 프로젝트 연결</h3>
                      <p className="text-xs text-slate-400 mt-1">프로젝트 리스트 DB에서 대상을 선택하세요.</p>
                    </div>
                    <button onClick={() => setIsSearchModalOpen(false)} className="p-2 hover:bg-slate-100 rounded-full transition-colors"><Icon name="X" size={24} className="text-slate-400" /></button>
                  </div>

                  <div className="relative mb-6">
                    <Icon name="Search" size={20} className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400" />
                    <input 
                      type="text" 
                      placeholder="공사명으로 검색..." 
                      className="w-full bg-slate-50 border-2 border-slate-100 pl-12 pr-4 py-4 rounded-2xl font-bold outline-none focus:border-blue-500 transition-all"
                      value={searchQuery}
                      onChange={(e) => setSearchQuery(e.target.value)}
                    />
                  </div>

                  <div className="flex-1 overflow-y-auto space-y-2 pr-2">
                    {serverProjectList.length === 0 ? (
                      <div className="text-center py-10 text-slate-400 font-bold">
                        불러온 프로젝트가 없습니다. (Firestore 규칙 확인)
                      </div>
                    ) : (
                      serverProjectList
                        .filter(p => p.projectName.toLowerCase().includes(searchQuery.toLowerCase()))
                        .map(proj => (
                          <div 
                            key={proj.id} 
                            onClick={() => handleSelectProject(proj)}
                            className="bg-slate-50 border-2 border-slate-100 p-4 rounded-2xl hover:border-blue-500 hover:bg-blue-50 cursor-pointer transition-all group"
                          >
                            <h4 className="font-black text-lg text-slate-800 group-hover:text-blue-700">{proj.projectName}</h4>
                            <p className="text-xs text-slate-400 font-bold mt-1">ID: {proj.id} | 기간: {proj.start || '?'} ~ {proj.end || '?'}</p>
                          </div>
                      ))
                    )}
                  </div>
                </div>
              </div>
            )}

            {/* 히스토리(이전 기록) 목록 모달 */}
            {isHistoryModalOpen && (
              <div className="fixed inset-0 bg-slate-900/70 backdrop-blur-md z-[150] flex items-center justify-center p-4 animate-in fade-in duration-300">
                <div className="bg-white rounded-[2.5rem] w-full max-w-lg shadow-2xl p-8 flex flex-col max-h-[80vh]">
                  <div className="flex justify-between items-center mb-6">
                    <div>
                      <h3 className="text-2xl font-black text-slate-800">이전 공정표 기록 (History)</h3>
                      <p className="text-xs text-slate-400 mt-1">해당 현장의 과거 저장 버전을 선택하여 복원합니다.</p>
                    </div>
                    <button onClick={() => setIsHistoryModalOpen(false)} className="p-2 hover:bg-slate-100 rounded-full transition-colors"><Icon name="X" size={24} className="text-slate-400" /></button>
                  </div>

                  <div className="flex-1 overflow-y-auto space-y-3 pr-2">
                    {historyList.length === 0 ? (
                      <div className="text-center py-10 text-slate-400 font-bold bg-slate-50 rounded-2xl">
                        저장된 이전 기록이 없습니다.
                      </div>
                    ) : (
                      historyList.map(item => {
                        const dateObj = new Date(item.updatedAt);
                        const dateStr = dateObj.toLocaleDateString('ko-KR', { year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' });
                        return (
                          <div 
                            key={item.id} 
                            onClick={() => loadHistoryVersion(item)}
                            className="bg-white border-2 border-slate-200 p-4 rounded-2xl hover:border-blue-500 hover:bg-blue-50 hover:shadow-md cursor-pointer transition-all flex items-center justify-between group"
                          >
                            <div>
                              <div className="flex items-center gap-2 mb-1">
                                <span className="bg-blue-100 text-blue-700 font-black text-xs px-2 py-0.5 rounded-md">
                                  v{item.versionNum}
                                </span>
                                <span className="text-slate-400 text-[10px] font-bold">작성자: {item.authorEmail || 'unknown'}</span>
                              </div>
                              <h4 className="font-bold text-slate-700 group-hover:text-blue-700">{dateStr}에 저장됨</h4>
                            </div>
                            <Icon name="Download" size={20} className="text-slate-300 group-hover:text-blue-500" />
                          </div>
                        );
                      })
                    )}
                  </div>
                </div>
              </div>
            )}

          </div>
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
