<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>일용직 노무비 통합 관리 시스템</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body { font-family: 'Malgun Gothic', sans-serif; }
        /* 스크롤바 커스텀 */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #c1c1c1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #a8a8a8; }
    </style>
</head>
<body class="bg-gray-50">
    <div id="root"></div>

    <script>
        // 실제 사용 시 본인의 Firebase Config 값으로 교체하세요.
        window.__firebase_config = JSON.stringify({
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_AUTH_DOMAIN",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_STORAGE_BUCKET",
            messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
            appId: "YOUR_APP_ID"
        });
        window.__app_id = 'default-payroll-app';
    </script>

    <script type="text/babel" data-type="module">
        import React, { useState, useEffect, useMemo, useRef } from 'https://esm.sh/react@18';
        import { createRoot } from 'https://esm.sh/react-dom@18/client';
        
        // Lucide Icons
        import * as LucideIcons from 'https://esm.sh/lucide-react@0.300.0';
        const { Copy, Plus, Save, X, Trash2, CalendarDays, Calculator, Receipt, Download, Upload, Database, FileSpreadsheet, AlertTriangle, FilePlus, Settings, FileUp, Users, ListFilter, Search, HelpCircle } = LucideIcons;
        
        // Firebase
        import { initializeApp } from 'https://esm.sh/firebase@10.8.0/app';
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from 'https://esm.sh/firebase@10.8.0/auth';
        import { getFirestore, collection, onSnapshot, doc, setDoc, addDoc, deleteDoc } from 'https://esm.sh/firebase@10.8.0/firestore';

        // --- Firebase 초기화 ---
        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {};
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-payroll-app';

        // Firebase 저장용 데이터 정제 (undefined 제거)
        const sanitizePayload = (obj) => JSON.parse(JSON.stringify(obj));

        // --- 엑셀 라이브러리 동적 로드 ---
        const loadExcelJS = async () => {
            if (window.ExcelJS) return window.ExcelJS;
            return new Promise((resolve, reject) => {
                const script = document.createElement('script');
                script.src = 'https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js';
                script.onload = () => resolve(window.ExcelJS);
                script.onerror = reject;
                document.head.appendChild(script);
            });
        };

        // ---------------------------------------------------------
        // 공통 유틸 및 세금 계산 로직
        // ---------------------------------------------------------
        const formatComma = (num) => (num || num === 0) ? num.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ",") : '';
        const parseComma = (str) => Number(String(str || "").replace(/[^0-9]/g, ''));
        const getDaysCount = (arr) => arr.reduce((acc, curr) => acc + (Number(curr) || 0), 0);

        const getAgeInfo = (ssnInput, year, month, attendanceArray) => {
            const ssn = (ssnInput || '').replace(/[^0-9]/g, '');
            if (ssn.length < 13) return { valid: false, isPensionExempt: false, isEmpInsuranceExempt: false, message: '주민번호 13자리를 입력해주세요.' };
            
            const yy = parseInt(ssn.substring(0, 2), 10);
            const mm = parseInt(ssn.substring(2, 4), 10);
            const dd = parseInt(ssn.substring(4, 6), 10);
            const genderDigit = parseInt(ssn.substring(6, 7), 10); // 7번째 자리 추출
            
            let century = 1900;
            if ([3, 4, 7, 8].includes(genderDigit)) century = 2000;
            else if ([9, 0].includes(genderDigit)) century = 1800;
            else if (![1, 2, 5, 6].includes(genderDigit)) return { valid: false, isPensionExempt: false, isEmpInsuranceExempt: false, message: '유효하지 않은 주민번호 형식입니다.' };

            const fullYear = century + yy;
            const workYear = parseInt(year, 10);
            const workMonth = parseInt(month, 10);
            if (isNaN(workYear) || isNaN(workMonth)) return { valid: false, isPensionExempt: false, isEmpInsuranceExempt: false, message: '년/월 정보가 유효하지 않습니다.' };

            const age60Date = new Date(fullYear + 60, mm - 1, dd);
            const age65Date = new Date(fullYear + 65, mm - 1, dd);
            
            let firstWorkDay = 1;
            if (attendanceArray) {
                for (let i = 0; i < attendanceArray.length; i++) { if (attendanceArray[i] > 0) { firstWorkDay = i + 1; break; } }
            }
            const workStartDate = new Date(workYear, workMonth - 1, firstWorkDay);

            const isPensionExempt = workStartDate >= age60Date; // 60세 이상
            const isEmpInsuranceExempt = workStartDate >= age65Date; // 65세 이상

            let msg = [];
            if (isPensionExempt) msg.push('만 60세↑');
            if (isEmpInsuranceExempt) msg.push('만 65세↑');

            return { valid: true, isPensionExempt, isEmpInsuranceExempt, message: msg.length > 0 ? `✅ 내국인 (${msg.join(', ')})` : '✅ 내국인 (연령면제 없음)' };
        };

        const trunc10 = (val) => Math.floor(val / 10) * 10;
        const trunc100 = (val) => Math.floor(val / 100) * 100;

        const calculateTaxes = (attendanceArray, appliedUnitPrice, rates, exemptions = {}) => {
            let totalDays = 0;
            let totalGross = 0;
            let totalDailyIncomeTax = 0;

            if (attendanceArray && attendanceArray.length > 0) {
                attendanceArray.forEach(val => {
                    const dayValue = Number(val) || 0;
                    if (dayValue > 0) {
                        totalDays += dayValue;
                        const dailyWage = appliedUnitPrice * dayValue; 
                        totalGross += dailyWage;

                        let dailyTaxBase = dailyWage - rates.incomeTaxDeduction;
                        if (dailyTaxBase > 0) {
                            let dailyTax = Math.floor(dailyTaxBase * (rates.incomeTaxRate / 100));
                            totalDailyIncomeTax += dailyTax; 
                        }
                    }
                });
            }

            if (totalDays === 0 || appliedUnitPrice === 0) {
                return { gross: 0, incomeTax: 0, localTax: 0, empInsurance: 0, pension: 0, healthInsurance: 0, totalDeduction: 0, netPay: 0, days: 0, breakdowns: {} };
            }

            const gross = Math.round(totalGross);
            
            let incomeTax = trunc100(totalDailyIncomeTax);
            if (incomeTax < 1000) incomeTax = 0; 
            let localTax = trunc10(incomeTax * ((rates.localTaxRate || 10) / 100));
            
            let empInsurance = 0;
            if (!exemptions.forceEmpExempt && !exemptions.is65Over) {
                empInsurance = trunc10(gross * (rates.empInsurance / 100));
            }
            
            let isPensionApplicable = false;
            if (!exemptions.forcePensionExempt) {
                if (exemptions.isForeigner || exemptions.is60Over) {
                    isPensionApplicable = true; 
                } else {
                    if (totalDays >= 8 || exemptions.targetA >= 2200000) {
                        isPensionApplicable = true;
                    }
                }
            }
            let pension = isPensionApplicable ? trunc10(gross * (rates.pension / 100)) : 0;
            
            let isHealthApplicable = false;
            if (!exemptions.forceHealthExempt && totalDays >= 8) {
                isHealthApplicable = true;
            }
            let healthInsurance = 0;
            if (isHealthApplicable) {
                let baseHealth = trunc10(gross * (rates.health / 100));
                let longTermCare = trunc10(baseHealth * (rates.longTermCare / 100));
                healthInsurance = baseHealth + longTermCare;
            }

            let totalDeduction = incomeTax + localTax + empInsurance + pension + healthInsurance;
            let netPay = gross - totalDeduction;

            const breakdowns = {
                gross: `적용단가(${formatComma(Math.round(appliedUnitPrice))}) * 총공수(${totalDays}일)`,
                incomeTax: `[소득세]\n일별 징수액 합산(${formatComma(totalDailyIncomeTax)}) -> 100원 미만 절사\n\n[지방세]\n소득세(${formatComma(incomeTax)}) * ${(rates.localTaxRate || 10)}%`,
                empInsurance: `노무총액(${formatComma(gross)}) * ${rates.empInsurance}%`,
                pension: `노무총액(${formatComma(gross)}) * ${rates.pension}%`,
                healthInsurance: `[건강보험]\n노무총액(${formatComma(gross)}) * ${rates.health}%\n\n[장기요양]\n건보료 * ${rates.longTermCare}%`
            };

            return { gross, incomeTax, localTax, empInsurance, pension, healthInsurance, totalDeduction, netPay, days: totalDays, breakdowns };
        };

        const findAppliedUnitPriceForNetPay = (targetNetPay, attendanceArray, rates, exemptions) => {
            const reportedDays = getDaysCount(attendanceArray);
            if (reportedDays === 0 || targetNetPay <= 0) return 0;
            let low = 0, high = targetNetPay * 2, mid = 0, bestP = 0, bestDiff = Infinity;
            for (let i = 0; i < 60; i++) {
                mid = (low + high) / 2;
                const result = calculateTaxes(attendanceArray, mid, rates, exemptions);
                const diff = result.netPay - targetNetPay;
                if (Math.abs(diff) < bestDiff) { bestDiff = Math.abs(diff); bestP = mid; }
                if (diff > 0) high = mid;
                else if (diff < 0) low = mid;
                else break;
            }
            return bestP;
        };

        // ---------------------------------------------------------
        // 메인 컴포넌트
        // ---------------------------------------------------------
        function App() {
            const [user, setUser] = useState(null);
            const [savedDocuments, setSavedDocuments] = useState([]);
            const [workerRegistry, setWorkerRegistry] = useState([]);
            const [currentDocId, setCurrentDocId] = useState(null);
            const [isLoading, setIsLoading] = useState(true);

            const defaultTaxRates = { empInsurance: 0.9, pension: 4.75, health: 3.595, longTermCare: 13.14, incomeTaxDeduction: 150000, incomeTaxRate: 2.7, localTaxRate: 10 };

            const [siteInfo, setSiteInfo] = useState({
                year: new Date().getFullYear().toString(),
                month: (new Date().getMonth() + 1).toString().padStart(2, '0'),
                siteName: '', insuranceNumber: '', startDate: '', endDate: '', taxRates: defaultTaxRates
            });
            
            const [workers, setWorkers] = useState([]);

            // UI 상태
            const [isFormOpen, setIsFormOpen] = useState(false);
            const [editingWorker, setEditingWorker] = useState(null);
            const [inputModal, setInputModal] = useState({ isOpen: false, type: '', index: 0, value: '' });
            const [confirmModal, setConfirmModal] = useState({ isOpen: false, message: '', onConfirm: null, confirmText: '확인', cancelText: '취소' });
            const [loadDocModalOpen, setLoadDocModalOpen] = useState(false);
            const [isTaxSettingsOpen, setIsTaxSettingsOpen] = useState(false);
            const [manualModalOpen, setManualModalOpen] = useState(false);
            const [toastMessage, setToastMessage] = useState('');

            const [internalExcelModalOpen, setInternalExcelModalOpen] = useState(false);
            const [externalExcelModalOpen, setExternalExcelModalOpen] = useState(false);
            const [allWorkersModalOpen, setAllWorkersModalOpen] = useState(false); 
            const [selectedDocsForExcel, setSelectedDocsForExcel] = useState([]);
            const [templateFile, setTemplateFile] = useState(null);

            const [suggestions, setSuggestions] = useState([]);
            const [showSuggestions, setShowSuggestions] = useState(false);
            const [activeSuggestionIndex, setActiveSuggestionIndex] = useState(0);
            const suggestionRef = useRef(null);
            
            const fileInputRef = useRef(null); 
            const newExcelInputRef = useRef(null); 

            const [filterSiteName, setFilterSiteName] = useState('ALL');
            const [filterPeriod, setFilterPeriod] = useState('ALL');

            const defaultWorker = {
                name: '', job: '', ssn: '', unitPrice: 0, taxType: '세전', 
                mealAllowance: 0, otherExpenses: 0, otherExpensesDesc: '',
                actualAttendance: Array(31).fill(0), reportedAttendance: Array(31).fill(0),
                isForeigner: false, visaType: '없음', forceEmpExempt: false, forcePensionExempt: false, forceHealthExempt: false
            };
            const [formData, setFormData] = useState(defaultWorker);
            const [tempRates, setTempRates] = useState(defaultTaxRates);

            // --- Firebase Init ---
            useEffect(() => {
                const initAuth = async () => {
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) await signInWithCustomToken(auth, __initial_auth_token);
                        else await signInAnonymously(auth);
                    } catch (error) { console.error("인증 실패:", error); }
                };
                initAuth();
                const unsubscribe = onAuthStateChanged(auth, setUser);
                return () => unsubscribe();
            }, []);

            useEffect(() => {
                if (!user) return;
                const docsRef = collection(db, 'artifacts', appId, 'public', 'data', 'payroll_documents');
                const registryRef = collection(db, 'artifacts', appId, 'public', 'data', 'payroll_registry');
                setIsLoading(true);

                const unsubDocs = onSnapshot(docsRef, async (snapshot) => {
                    const docsData = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    docsData.sort((a, b) => b.createdAt - a.createdAt);
                    setSavedDocuments(docsData);
                    setIsLoading(false);
                }, (error) => console.error("문서 구독 에러:", error));

                const unsubRegistry = onSnapshot(registryRef, (snapshot) => {
                    const registryData = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    setWorkerRegistry(registryData);
                }, (error) => console.error("레지스트리 구독 에러:", error));

                return () => { unsubDocs(); unsubRegistry(); };
            }, [user]);

            // UI 헬퍼
            const showToast = (msg) => { setToastMessage(msg); setTimeout(() => setToastMessage(''), 4000); };

            const handleSsnChange = (e) => {
                let val = e.target.value.replace(/[^0-9]/g, '');
                if (val.length > 13) val = val.slice(0, 13);
                let formatted = val;
                if (val.length > 6) formatted = val.slice(0, 6) + '-' + val.slice(6);
                
                let isForAuto = formData.isForeigner;
                let forceEmp = formData.forceEmpExempt;
                let forcePen = formData.forcePensionExempt;

                if (val.length >= 7) {
                    const genderDigit = parseInt(val.charAt(6), 10);
                    if ([5, 6, 7, 8].includes(genderDigit)) {
                        isForAuto = true;
                        if (formData.visaType === '없음') forceEmp = true;
                        else forceEmp = false;
                        forcePen = true;
                    } else if ([1, 2, 3, 4, 9, 0].includes(genderDigit)) {
                        isForAuto = false;
                        forceEmp = false;
                        forcePen = false;
                    }
                }
                
                if (val.length >= 13) {
                    const ageInfo = getAgeInfo(formatted, siteInfo.year, siteInfo.month, formData.reportedAttendance);
                    if (ageInfo.isPensionExempt) forcePen = true;
                    if (ageInfo.isEmpInsuranceExempt) forceEmp = true;
                }

                setFormData({ ...formData, ssn: formatted, isForeigner: isForAuto, forceEmpExempt: forceEmp, forcePensionExempt: forcePen });
            };

            const handleForeignerToggle = (e) => {
                const isFor = e.target.checked;
                setFormData(prev => ({
                    ...prev,
                    isForeigner: isFor,
                    forceEmpExempt: isFor && prev.visaType === '없음' ? true : prev.forceEmpExempt,
                    forcePensionExempt: isFor ? true : prev.forcePensionExempt
                }));
            };

            const handleVisaChange = (e) => {
                const v = e.target.value;
                setFormData(prev => ({
                    ...prev,
                    visaType: v,
                    forceEmpExempt: v === '없음' ? true : false
                }));
            };

            const handleExcelUpload = async (e) => {
                const files = e.target.files;
                if (!files.length) return;
                setIsLoading(true);
                showToast("엑셀 파일들을 분석하여 근로자 데이터를 추출하고 있습니다...");
                
                try {
                    const ExcelJS = await loadExcelJS();
                    const docsRef = collection(db, 'artifacts', appId, 'public', 'data', 'payroll_documents');
                    const registryRef = collection(db, 'artifacts', appId, 'public', 'data', 'payroll_registry');
                    
                    const getCellText = (ws, address) => {
                        try {
                            const cell = ws.getCell(address);
                            if (!cell || cell.value === null || cell.value === undefined) return "";
                            if (typeof cell.value === 'object') {
                                if (cell.value.richText) return cell.value.richText.map(rt => rt.text).join('');
                                if (cell.value.result !== undefined) return String(cell.value.result);
                            }
                            return String(cell.value);
                        } catch (err) { return ""; }
                    };

                    for (const file of files) {
                        const arrayBuffer = await file.arrayBuffer();
                        const wb = new ExcelJS.Workbook();
                        await wb.xlsx.load(arrayBuffer);

                        for (const ws of wb.worksheets) {
                            const sheetName = ws.name;
                            if (sheetName.includes("프리랜서") || sheetName.includes("세금") || sheetName.includes("집계표")) continue;

                            const title = getCellText(ws, 'A2');
                            const yearMatch = title.match(/(\d{4})년/);
                            const monthMatch = title.match(/(\d{1,2})월/);
                            const year = yearMatch ? yearMatch[1] : new Date().getFullYear().toString();
                            const month = monthMatch ? monthMatch[1].padStart(2, '0') : "01";

                            const w2Text = getCellText(ws, 'W2');
                            let parsedSiteName = sheetName;
                            let parsedInsurance = "";
                            const siteMatch = w2Text.match(/현\s*장\s*명\s*:\s*(.*?)(?:\(([\d\-]+)\))?$/);
                            if (siteMatch) { parsedSiteName = siteMatch[1].trim(); if (siteMatch[2]) parsedInsurance = siteMatch[2].trim(); }

                            const w3Text = getCellText(ws, 'W3');
                            let startDate = ""; let endDate = "";
                            const dateMatch = w3Text.match(/\(([\d\.]+)\s*~\s*([\d\.]+)\)/);
                            if (dateMatch) { startDate = dateMatch[1].trim(); endDate = dateMatch[2].trim(); }

                            const parsedWorkers = [];
                            for (let r = 7; r <= ws.rowCount; r += 2) {
                                const noValue = ws.getCell('A' + r).value;
                                if (noValue === null || noValue === undefined || String(noValue).trim() === '' || isNaN(Number(noValue))) continue;

                                const name = getCellText(ws, 'B' + r).trim();
                                if (!name || name.includes('합계') || name.includes('합 계')) continue;

                                const ssn = getCellText(ws, 'C' + r).trim();
                                const job = getCellText(ws, 'A' + (r + 1)).trim() || getCellText(ws, 'C' + (r + 1)).trim();
                                
                                const unitPrice = parseFloat(ws.getCell('T' + (r + 1)).value) || 0;
                                const mealAllowance = parseFloat(ws.getCell('Z' + r).value) || parseFloat(ws.getCell('Y' + r).value) || 0; 
                                const otherExpenses = parseFloat(ws.getCell('X' + (r + 1)).value) || parseFloat(ws.getCell('W' + (r + 1)).value) || 0;

                                const actualAttendance = Array(31).fill(0);
                                const reportedAttendance = Array(31).fill(0);

                                for (let d = 1; d <= 15; d++) { if (ws.getCell(r, 3 + d).value) { actualAttendance[d-1] = 1; reportedAttendance[d-1] = 1; } }
                                for (let d = 16; d <= 30; d++) { if (ws.getCell(r + 1, 3 + d - 15).value) { actualAttendance[d-1] = 1; reportedAttendance[d-1] = 1; } }
                                if (ws.getCell(r + 1, 19).value) { actualAttendance[30] = 1; reportedAttendance[30] = 1; }

                                const ssnRaw = ssn.replace(/[^0-9]/g, '');
                                let formattedSsn = ssnRaw;
                                if (ssnRaw.length >= 13) {
                                    formattedSsn = ssnRaw.slice(0, 6) + '-' + ssnRaw.slice(6, 13);
                                }
                                
                                let isForeigner = false;
                                let visaType = "없음";

                                if (ssnRaw.length >= 7 && [5, 6, 7, 8].includes(parseInt(ssnRaw.charAt(6), 10))) {
                                    isForeigner = true;
                                }

                                const ageInfo = getAgeInfo(ssnRaw, year, month, reportedAttendance);

                                const forceEmpExempt = (isForeigner && visaType === '없음') || ageInfo.isEmpInsuranceExempt;
                                const forcePensionExempt = isForeigner || ageInfo.isPensionExempt;
                                const forceHealthExempt = false;

                                parsedWorkers.push({
                                    id: Date.now().toString() + Math.random(),
                                    name, ssn: formattedSsn, job, unitPrice, appliedUnitPrice: unitPrice, taxType: '세전', 
                                    mealAllowance, otherExpenses, otherExpensesDesc: '',
                                    actualAttendance, reportedAttendance,
                                    isForeigner, visaType, forceEmpExempt, forcePensionExempt, forceHealthExempt
                                });
                            }

                            if (parsedWorkers.length > 0) {
                                const siteData = sanitizePayload({
                                    siteInfo: { year, month, siteName: parsedSiteName, insuranceNumber: parsedInsurance, startDate, endDate, taxRates: defaultTaxRates },
                                    workers: parsedWorkers,
                                    createdAt: Date.now(), updatedAt: Date.now(),
                                    searchKey: `${year}-${month} ${parsedSiteName}`
                                });
                                await addDoc(docsRef, siteData);

                                for (const w of parsedWorkers) {
                                    const existingWorker = workerRegistry.find(r => r.ssn === w.ssn && r.name === w.name);
                                    let recentSites = existingWorker ? existingWorker.recentSites || [] : [];
                                    if (!recentSites.includes(parsedSiteName)) { 
                                        recentSites.unshift(parsedSiteName); 
                                        if (recentSites.length > 5) recentSites = recentSites.slice(0, 5);
                                    }
                                    const registryData = sanitizePayload({ name: w.name, ssn: w.ssn, lastUnitPrice: w.unitPrice, lastJob: w.job, recentSites, updatedAt: Date.now() });
                                    if (existingWorker) await setDoc(doc(registryRef, existingWorker.id), registryData, { merge: true });
                                    else await addDoc(registryRef, registryData);
                                }
                            }
                        }
                    }
                    showToast("🎉 업로드하신 엑셀 파일 파싱 및 근로자 목록 업데이트가 완료되었습니다!");
                } catch (e) {
                    console.error(e);
                    showToast("엑셀 파일 분석 중 오류가 발생했습니다. 파일 형식을 확인해주세요.");
                } finally {
                    setIsLoading(false);
                    if(fileInputRef.current) fileInputRef.current.value = ""; 
                }
            };

            const handleNewExcelUpload = async (e) => {
                const files = e.target.files;
                if (!files.length) return;
                
                setIsLoading(true);
                showToast("엑셀 파일에서 근로자 데이터를 추출하여 현재 명세서에 추가합니다...");

                try {
                    const ExcelJS = await loadExcelJS();
                    
                    const getCellText = (ws, address) => {
                        try {
                            const cell = ws.getCell(address);
                            if (!cell || cell.value === null || cell.value === undefined) return "";
                            if (typeof cell.value === 'object') {
                                if (cell.value.richText) return cell.value.richText.map(rt => rt.text).join('');

            const buildExemptions = (w, actD, repD, ageInfo) => {

                html += `<tr><td colspan="${totalCols}" class="title">근로기간: ${periodStr}</td></tr>`;

            };

            const FilterSection = () => (
                <div className="flex gap-3 mb-4 p-3 bg-gray-100 rounded-lg border border-gray-200">
                    <div className="flex items-center gap-2">
                        <Search size={16} className="text-gray-500" />
                        <select value={filterPeriod || 'ALL'} onChange={e => setFilterPeriod(e.target.value)} className="px-2 py-1 text-sm border rounded focus:ring-2 outline-none">
                            <option value="ALL">전체 기간</option>
                            {uniquePeriods.map(p => <option key={p} value={p}>{p}</option>)}
                        </select>
                    </div>
                    <div className="flex items-center gap-2 flex-1">
                        <select value={filterSiteName || 'ALL'} onChange={e => setFilterSiteName(e.target.value)} className="px-2 py-1 text-sm border rounded flex-1 focus:ring-2 outline-none">
                            <option value="ALL">전체 현장</option>
                            {uniqueSites.map(s => <option key={s} value={s}>{s}</option>)}
                        </select>
                    </div>
                </div>
            );

            return (
                <div className="min-h-screen bg-gray-50 font-sans text-gray-800 p-6">
                    <div className="max-w-[1800px] mx-auto">
                        {toastMessage && (
                            <div className="fixed top-5 left-1/2 transform -translate-x-1/2 bg-gray-800 text-white px-6 py-3 rounded-xl shadow-2xl z-50 flex items-center gap-2 animate-bounce border border-gray-600">
                                <Database size={16} className="text-blue-400 flex-shrink-0" /> 
                                <span className="text-sm font-medium leading-relaxed">{toastMessage}</span>
                            </div>
                        )}
                        <div className="bg-white rounded-xl shadow-sm border border-gray-200 p-4 mb-4 flex justify-between items-center">
                            <div className="flex items-center gap-3">
                                <div className="bg-blue-100 p-2 rounded-lg"><Database className="text-blue-600" size={24} /></div>
                                <div>
                                    <h2 className="font-bold text-gray-800 flex items-center gap-2">통합 관리 시스템</h2>
                                </div>
                            </div>
                            <div className="flex gap-2">
                                <input type="file" ref={fileInputRef} onChange={handleExcelUpload} accept=".xlsx" multiple className="hidden" />
                                <button onClick={() => fileInputRef.current.click()} className="flex items-center gap-2 px-4 py-2 bg-orange-50 text-orange-700 border border-orange-200 rounded-lg hover:bg-orange-100 font-bold text-sm shadow-sm"><FileUp size={16} /> 📁 과거 엑셀 파싱</button>

                                <input type="file" ref={newExcelInputRef} onChange={handleNewExcelUpload} accept=".xlsx" multiple className="hidden" />
                                <button onClick={() => newExcelInputRef.current.click()} className="flex items-center gap-2 px-4 py-2 bg-purple-50 text-purple-700 border border-purple-200 rounded-lg hover:bg-purple-100 font-bold text-sm shadow-sm"><CalendarDays size={16} /> 📝 엑셀 추가</button>
                                
                                <button onClick={() => setAllWorkersModalOpen(true)} className="flex items-center gap-2 px-4 py-2 bg-blue-50 text-blue-700 border border-blue-200 rounded-lg hover:bg-blue-100 font-bold text-sm shadow-sm"><Users size={16} /> 👥 모든 근로자</button>
                                <div className="w-px h-8 bg-gray-300 mx-1"></div>
                                <button onClick={handleNewDocument} className="flex items-center gap-2 px-4 py-2 bg-gray-100 border border-gray-300 rounded-lg hover:bg-gray-200 font-medium text-sm"><FilePlus size={16} /> 새 명세서</button>
                                <button onClick={() => setLoadDocModalOpen(true)} className="flex items-center gap-2 px-4 py-2 border border-gray-300 rounded-lg hover:bg-gray-50 font-medium text-sm"><Upload size={16} /> 불러오기</button>
                                {currentDocId ? (
                                    <div className="flex gap-1">
                                        <button onClick={handleOverwriteClick} className="flex items-center gap-2 px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg font-medium text-sm"><Save size={16} /> 덮어쓰기</button>
                                    </div>
                                ) : (
                                    <button onClick={() => handleSaveDocumentToServer(false)} className="flex items-center gap-2 px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg font-medium text-sm"><Save size={16} /> 서버 저장</button>
                                )}
                                <div className="w-px h-8 bg-gray-300 mx-1"></div>
                                <button onClick={() => setInternalExcelModalOpen(true)} className="flex items-center gap-2 px-4 py-2 bg-emerald-600 hover:bg-emerald-700 text-white rounded-lg font-medium text-sm"><FileSpreadsheet size={16} /> 내부 엑셀</button>
                                <button onClick={() => setExternalExcelModalOpen(true)} className="flex items-center gap-2 px-6 py-2 border border-emerald-600 bg-emerald-50 text-emerald-800 hover:bg-emerald-100 rounded-lg font-bold text-sm"><FileSpreadsheet size={18} /> 외부 엑셀</button>
                            </div>
                        </div>

                        <div className="bg-white rounded-xl shadow-sm border border-gray-200 p-6 mb-6">
                            <div className="flex justify-between items-end mb-6">
                                <h1 className="text-3xl font-bold text-gray-900 tracking-tight">
                                    <input type="text" value={siteInfo.year || ''} onChange={e => setSiteInfo({...siteInfo, year: e.target.value})} className="w-24 border-b-2 border-transparent hover:border-gray-300 focus:border-blue-500 outline-none text-center" />년 
                                    <input type="text" value={siteInfo.month || ''} onChange={e => setSiteInfo({...siteInfo, month: e.target.value})} className="w-16 border-b-2 border-transparent hover:border-gray-300 focus:border-blue-500 outline-none text-center mx-1" />월 지급명세서
                                </h1>
                                <button onClick={() => { setIsFormOpen(true); setEditingWorker(null); setFormData(defaultWorker); }} className="flex items-center gap-2 bg-gray-800 hover:bg-gray-900 text-white px-4 py-2 rounded-lg font-medium"><Plus size={18} /> 근로자 추가</button>
                            </div>
                            <div className="grid grid-cols-4 gap-4 bg-gray-50 p-4 rounded-lg border border-gray-100">
                                <div className="col-span-2">
                                    <label className="block text-xs font-semibold text-gray-500 mb-1">현장명</label>
                                    <input type="text" value={siteInfo.siteName || ''} onChange={e => setSiteInfo({...siteInfo, siteName: e.target.value})} className="w-full px-3 py-2 border rounded-md" placeholder="예: 평택 현장" />
                                </div>
                                <div className="col-span-2">
                                    <label className="block text-xs font-semibold text-gray-500 mb-1">고용산재번호</label>
                                    <input type="text" value={siteInfo.insuranceNumber || ''} onChange={e => setSiteInfo({...siteInfo, insuranceNumber: e.target.value})} className="w-full px-3 py-2 border rounded-md" />
                                </div>
                            </div>
                            <div className="mt-4 bg-blue-50 border border-blue-100 rounded-lg p-4 flex justify-between items-center shadow-sm">
                                <div className="text-blue-800 font-bold flex items-center gap-2">현재 명세서 전체 요약 ({currentSummary.totalWorkers}명)</div>
                                <div className="flex gap-8 text-sm text-right">
                                    <div><div className="text-xs text-blue-600 mb-0.5 font-bold">A값(목표) 합계</div><div className="font-extrabold text-lg">{formatComma(currentSummary.totalA)} 원</div></div>
                                    <div><div className="text-xs text-red-500 mb-0.5 font-bold">공제액 합계</div><div className="font-extrabold text-red-600 text-lg">{formatComma(currentSummary.totalDeduct)} 원</div></div>
                                    <div className="bg-white px-3 py-1 rounded shadow-sm border"><div className="text-xs text-blue-700 mb-0.5 font-bold">실 지급액 합계</div><div className="font-black text-xl text-blue-700">{formatComma(currentSummary.totalNet)} 원</div></div>
                                </div>
                            </div>
                        </div>

                        {isFormOpen ? (
                            <div className="flex flex-col lg:flex-row gap-6 mb-6">
                                <div className="w-full lg:w-[70%] bg-white rounded-xl shadow-lg border border-blue-200 p-6 relative">
                                    <div className="flex justify-between items-center mb-6 border-b pb-4"><h2 className="text-xl font-bold">{editingWorker ? '근로자 수정' : '신규 근로자 등록'}</h2><button onClick={() => setIsFormOpen(false)}><X size={24} /></button></div>
                                    <div className="grid grid-cols-4 gap-6 mb-4">
                                        <div className="relative" ref={suggestionRef}>
                                            <label className="block text-sm font-semibold mb-1">성명</label>
                                            <input type="text" value={formData.name || ''} onChange={handleNameChange} onKeyDown={e => e.key==='Enter' && showSuggestions && selectSuggestion(suggestions[activeSuggestionIndex])} className="w-full px-3 py-2 border rounded-md" />
                                            {showSuggestions && suggestions.length > 0 && (
                                                <div className="absolute z-50 w-full mt-1 bg-white border border-gray-300 rounded-md shadow-lg max-h-60 overflow-y-auto">
                                                    {suggestions.map((w, idx) => ( <div key={w.id} onClick={() => selectSuggestion(w)} className={`px-4 py-2 cursor-pointer border-b ${idx === activeSuggestionIndex ? 'bg-blue-50' : 'hover:bg-gray-50'}`}>{w.name}</div> ))}
                                                </div>
                                            )}
                                        </div>
                                        <div><label className="block text-sm font-semibold mb-1">직종/팀명</label><input type="text" value={formData.job || ''} onChange={e => setFormData({...formData, job: e.target.value})} className="w-full px-3 py-2 border rounded-md" /></div>
                                        <div><label className="block text-sm font-semibold mb-1">주민등록번호</label><input type="text" value={formData.ssn || ''} onChange={handleSsnChange} className="w-full px-3 py-2 border rounded-md" placeholder="000000-0000000" /></div>
                                        <div><label className="block text-sm font-semibold mb-1">일 단가 (원)</label><input type="text" value={formatComma(formData.unitPrice)} onChange={e => setFormData({...formData, unitPrice: parseComma(e.target.value)})} className="w-full px-3 py-2 border rounded-md text-right font-semibold" /></div>
                                    </div>
                                    
                                    <div className="bg-orange-50 p-4 rounded-lg border border-orange-100 mb-6 flex flex-wrap gap-5 items-center">
                                        <label className="flex items-center gap-2 font-semibold text-orange-800 text-sm cursor-pointer">
                                            <input type="checkbox" checked={!!formData.isForeigner} onChange={handleForeignerToggle} className="w-4 h-4 text-orange-600 rounded" /> 외국인 근로자
                                        </label>
                                        <label className="flex items-center gap-1.5 text-sm cursor-pointer"><input type="checkbox" checked={!!formData.forceEmpExempt} onChange={e => setFormData({...formData, forceEmpExempt: e.target.checked})} /> 고용 강제제외</label>
                                        <label className="flex items-center gap-1.5 text-sm cursor-pointer"><input type="checkbox" checked={!!formData.forcePensionExempt} onChange={e => setFormData({...formData, forcePensionExempt: e.target.checked})} /> 연금 강제제외</label>
                                        <label className="flex items-center gap-1.5 text-sm cursor-pointer"><input type="checkbox" checked={!!formData.forceHealthExempt} onChange={e => setFormData({...formData, forceHealthExempt: e.target.checked})} /> 건강 강제제외</label>
                                    </div>

                                    <div className="flex gap-4 mb-8">
                                        <div className="w-1/4 bg-blue-50 p-4 rounded-lg border border-blue-100 flex flex-col justify-center">
                                            <label className="text-sm font-bold text-gray-800 mb-2">세금 기준</label>
                                            <select value={formData.taxType || '세전'} onChange={e => setFormData({...formData, taxType: e.target.value})} className="w-full px-3 py-2 border rounded-md font-bold text-blue-700"><option value="세전">세전 (총액 기준)</option><option value="세후">세후 (실지급 역산)</option></select>
                                        </div>
                                        <div className="flex-1 bg-gray-800 p-4 rounded-lg border text-white flex items-center">
                                            <div className="w-1/3 border-r border-gray-600 pr-4"><div className="text-xs text-gray-400 mb-1">목표 금액 (A값)</div><div className="text-xl font-bold text-yellow-400">{formatComma(autoCalculatedData.targetA)} 원</div></div>
                                            <div className="w-1/3 px-4 border-r border-gray-600"><div className="text-xs text-gray-400 mb-1">신고일수</div><div className="text-xl font-bold">{autoCalculatedData.reportedDays} 일</div></div>
                                            <div className="w-1/3 pl-4"><div className="text-xs text-gray-400 mb-1">적용단가</div><div className="text-2xl font-extrabold text-blue-300">{formatComma(Math.round(autoCalculatedData.appliedUnitPrice))} 원</div></div>
                                        </div>
                                    </div>

                                    <div className="bg-gray-50 p-5 rounded-lg border border-gray-200">
                                        <div className="mb-4 bg-white p-4 rounded border shadow-sm"><div className="mb-3 font-semibold text-green-700 bg-green-50 px-3 py-1 inline-block rounded-full text-sm">실제 작업일 (총 {autoCalculatedData.actualDays}공수)</div><div className="flex gap-1 overflow-x-auto pb-2">{formData.actualAttendance.map((val, idx) => (<button key={`actual-${idx}`} onClick={() => toggleAttendance('actualAttendance', idx)} className={`min-w-[32px] w-8 h-10 rounded-md border text-xs font-bold ${val > 0 ? 'bg-green-500 text-white' : 'bg-white text-gray-400'}`}>{idx + 1}</button>))}</div></div>
                                        <div className="flex justify-center my-4"><button onClick={handleCopyAttendance} className="bg-indigo-50 text-indigo-700 border px-6 py-2 rounded-full font-bold shadow-sm">실제일수 → 신고일수 복사</button></div>
                                        <div className="bg-white p-4 rounded border shadow-sm"><div className="mb-3 font-semibold text-indigo-700 bg-indigo-50 px-3 py-1 inline-block rounded-full text-sm">신고용 출력일 (총 {autoCalculatedData.reportedDays}일)</div><div className="flex gap-1 overflow-x-auto pb-2">{formData.reportedAttendance.map((val, idx) => (<button key={`reported-${idx}`} onClick={() => toggleAttendance('reportedAttendance', idx)} className={`min-w-[32px] w-8 h-10 rounded-md border text-xs font-bold ${val > 0 ? 'bg-indigo-500 text-white' : 'bg-white text-gray-400'}`}>{idx + 1}</button>))}</div></div>
                                    </div>

                                    <div className="mt-6 flex justify-end gap-3"><button onClick={() => setIsFormOpen(false)} className="px-5 py-2.5 rounded-lg border hover:bg-gray-50 font-medium">취소</button><button onClick={handleSaveWorkerForm} className="px-5 py-2.5 rounded-lg bg-blue-600 text-white flex items-center gap-2 font-medium">완료</button></div>
                                </div>

                                <div className="w-full lg:w-[30%] bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden sticky top-6">
                                    <div className="bg-gray-100 px-4 py-3 border-b font-bold text-gray-800">근로자 목록 ({workers.length}명)</div>
                                    <div className="overflow-y-auto max-h-[calc(100vh-150px)]">
                                        <table className="w-full text-sm text-left"><tbody className="divide-y">
                                            {workers.map((w) => (
                                                <tr key={w.id} className={`hover:bg-gray-50 ${editingWorker === w.id ? 'bg-blue-50' : ''}`}>
                                                    <td className="px-4 py-3"><div className="font-bold">{w.name}</div><div className="text-xs text-gray-500">{w.job}</div></td>
                                                    <td className="px-4 py-3 text-right"><button onClick={() => { setFormData(w); setEditingWorker(w.id); setIsFormOpen(true); }} className="text-blue-600 px-2 font-medium">수정</button></td>
                                                </tr>
                                            ))}
                                        </tbody></table>
                                    </div>
                                </div>
                            </div>
                        ) : (
                            <div className="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden mb-6">
                                <div className="overflow-x-auto">
                                    <table className="w-full text-sm text-left">
                                        <thead className="text-xs text-gray-700 uppercase bg-gray-100 border-b whitespace-nowrap">
                                            <tr><th className="px-4 py-3 text-center border-r">성명 / 직종</th><th className="px-4 py-3 text-center border-r">주민등록번호</th><th className="px-4 py-3 text-right border-r">A값(목표)</th><th className="px-4 py-3 text-right border-r">적용단가</th><th className="px-4 py-3 text-right border-r">공제 합계</th><th className="px-4 py-3 text-right border-r">실 지급액</th><th className="px-4 py-3 text-center">관리</th></tr>
                                        </thead>
                                        <tbody>
                                            {workers.map((w) => {
                                                const actD = getDaysCount(w.actualAttendance); const repD = getDaysCount(w.reportedAttendance);
                                                const ageInfo = getAgeInfo(w.ssn, siteInfo.year, siteInfo.month, w.reportedAttendance);
                                                const exemptions = buildExemptions(w, actD, repD, ageInfo);
                                                const workerTaxes = calculateTaxes(w.reportedAttendance, w.appliedUnitPrice, siteInfo.taxRates, exemptions);
                                                return (
                                                    <tr key={w.id} className="border-b hover:bg-gray-50">
                                                        <td className="px-4 py-3 border-r font-bold">{w.name}<div className="text-xs text-gray-500 font-normal">{w.job}</div></td>
                                                        <td className="px-4 py-3 border-r text-center">{w.ssn}</td>
                                                        <td className="px-4 py-3 border-r text-right text-gray-500">{formatComma(exemptions.targetA)}</td>
                                                        <td className="px-4 py-3 border-r text-right font-bold text-blue-800">{formatComma(Math.round(w.appliedUnitPrice))}</td>
                                                        <td className="px-4 py-3 border-r text-right text-red-500">{formatComma(workerTaxes.totalDeduction)}</td>
                                                        <td className="px-4 py-3 border-r text-right font-bold text-blue-700">{formatComma(workerTaxes.netPay)}</td>
                                                        <td className="px-4 py-3 text-center"><button onClick={() => { setFormData(w); setEditingWorker(w.id); setIsFormOpen(true); }} className="text-blue-600 px-2">수정</button></td>
                                                    </tr>
                                                );
                                            })}
                                            {workers.length === 0 && <tr><td colSpan="7" className="px-4 py-8 text-center text-gray-500">등록된 근로자가 없습니다.</td></tr>}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        )}

                        {/* 모달 팝업들 (외부/내부 엑셀, 근로자 목록, 불러오기 등)은 동일 로직 유지로 생략 없이 포함 */}
                        {externalExcelModalOpen && (
                            <div className="fixed inset-0 bg-black bg-opacity-40 flex items-center justify-center z-50 p-4">
                                <div className="bg-white rounded-xl shadow-2xl w-full max-w-2xl flex flex-col">
                                    <div className="flex justify-between items-center p-5 border-b"><h3 className="text-xl font-bold flex items-center gap-2"><FileSpreadsheet className="text-emerald-600" /> 외부 보고용 엑셀 출력</h3><button onClick={() => setExternalExcelModalOpen(false)}><X size={24} /></button></div>
                                    <div className="p-5">
                                        <div className="mb-6 bg-blue-50 p-4 rounded-lg border border-blue-200">
                                            <label className="block text-sm font-bold text-blue-800 mb-2">1. 템플릿 파일 업로드 (필수)</label>
                                            <input type="file" accept=".xlsx" onChange={(e) => setTemplateFile(e.target.files[0])} className="w-full bg-white border border-blue-300 p-2 rounded text-sm cursor-pointer" />
                                        </div>
                                        <FilterSection />
                                        <div className="grid gap-2 border border-gray-200 rounded p-2 overflow-y-auto max-h-40">
                                            {filteredDocuments.map(doc => (
                                                <label key={doc.id} className="flex items-center gap-3 p-3 border rounded-lg hover:bg-gray-50 cursor-pointer">
                                                    <input type="checkbox" checked={selectedDocsForExcel.includes(doc.id)} onChange={(e) => { e.target.checked ? setSelectedDocsForExcel([...selectedDocsForExcel, doc.id]) : setSelectedDocsForExcel(selectedDocsForExcel.filter(id => id !== doc.id)); }} className="w-5 h-5 text-emerald-600" />
                                                    <div><div className="font-bold text-sm">{doc.siteInfo?.year}년 {doc.siteInfo?.month}월 - {doc.siteInfo?.siteName}</div></div>
                                                </label>
                                            ))}
                                        </div>
                                    </div>
                                    <div className="p-5 border-t flex justify-end gap-3"><button onClick={() => setExternalExcelModalOpen(false)} className="px-5 py-2.5 bg-gray-200 rounded-lg font-medium">취소</button><button onClick={generateExternalExcel} disabled={selectedDocsForExcel.length === 0 || !templateFile} className="px-5 py-2.5 bg-emerald-600 text-white rounded-lg flex items-center gap-2 font-bold disabled:opacity-50"><Download size={18} /> 생성</button></div>
                                </div>
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        const root = createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
