    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 폰트어썸 (아이콘용) -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <style>
        /* 기본 폰트 설정 및 부드러운 스크롤 */
        @import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css');
        body {
            font-family: 'Pretendard', sans-serif;
            background-color: #f3f4f6; /* bg-gray-100 */
        }
        
        /* 카드 호버 시 부드러운 애니메이션 효과 */
        .bookmark-card {
            transition: all 0.2s ease-in-out;
        }
        .bookmark-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            border-color: #3b82f6; /* hover:border-blue-500 */
        }

        /* 스크롤바 디자인 */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f1f1; 
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8; 
        }
    </style>
</head>
<body class="text-gray-800 antialiased min-h-screen flex flex-col">

    <!-- Header Area -->

        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4">

    </header>

    <!-- Main Content Area -->
    <main class="flex-grow max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 w-full">
        
        <!-- Large Search Area -->
        <div class="w-full flex justify-center py-5 md:py-8 mb-5 border-b border-gray-200 pb-8">
            <div class="relative w-full max-w-3xl px-4 md:px-0">
                <div class="absolute inset-y-0 left-0 pl-6 md:pl-6 flex items-center pointer-events-none">
                    <i class="fa-solid fa-search text-gray-400 text-xl md:text-2xl"></i>
                </div>
                <input type="text" id="searchInput" 
                    class="block w-full pl-14 md:pl-16 pr-12 md:pr-16 py-3 md:py-4 border-2 border-gray-200 rounded-full bg-white placeholder-gray-400 focus:outline-none focus:ring-4 focus:ring-blue-500/20 focus:border-blue-500 text-lg md:text-xl transition-all shadow-md hover:shadow-lg" 
                    placeholder="북마크 검색...">
                <button id="clearSearchBtn" class="absolute inset-y-0 right-0 pr-6 md:pr-6 flex items-center hidden text-gray-400 hover:text-gray-600 transition-colors">
                    <i class="fa-solid fa-times-circle text-xl md:text-2xl"></i>
                </button>
            </div>
        </div>

        <!-- 1. Folder View -->
        <div id="folderView" class="space-y-10">
            <!-- Folders Rendered via JS -->
        </div>

        <!-- 2. Search View -->
        <div id="searchView" class="hidden">
            <h2 class="text-xl font-bold mb-6 text-gray-700 border-b pb-2 flex items-center gap-2">
                <i class="fa-solid fa-list-ul"></i> 검색 결과 <span id="searchCount" class="text-blue-500 text-lg">0</span>건
            </h2>
            <div id="searchResults" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4">
                <!-- Search Results Rendered via JS -->
            </div>
            <!-- No Results -->
            <div id="noResults" class="hidden text-center py-20">
                <i class="fa-regular fa-face-frown text-4xl text-gray-400 mb-3"></i>
                <p class="text-gray-500 text-lg">검색 결과가 없습니다.</p>
            </div>
        </div>

    </main>

    <!-- Footer -->
    <footer class="bg-white border-t border-gray-200 mt-auto">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6 text-center text-sm text-gray-500">

        </div>
    </footer>

                    { title: "품질관리자 선임기준", url: "https://www.law.go.kr/LSW/lsInfoP.do?efYd=20190701&lsiSeq=209050#0000", desc: "법령 정보" },
                    { title: "내화구조품질관리서", url: "https://www.law.go.kr/LSW/lsInfoP.do?lsiSeq=238615&viewCls=lsRvsDocInfoR#EJ24:3", desc: "법령 정보" },
                    { title: "대기환경보전법", url: "https://www.law.go.kr/LSW/lsInfoP.do?efYd=20200403&lsiSeq=208235#J43:0", desc: "법령 정보" },
                    { title: "중복배치법률", url: "https://law.go.kr/%EB%B2%95%EB%A0%B9/%EA%B1%B4%EC%84%A4%EC%82%B0%EC%97%85%EA%B8%B0%EB%B3%B8%EB%B2%95%EC%8B%9C%ED%96%89%EB%A0%B9", desc: "건설산업기본법 시행령" },
                    { title: "자율형건물번호판의 규격", url: "https://www.law.go.kr/%EB%B2%95%EB%A0%B9/%EC%A3%BC%EC%86%8C%EC%A0%95%EB%B3%B4%EC%8B%9C%EC%84%A4%EA%B7%9C%EC%B9%99", desc: "주소정보시설규칙" },
                    { title: "용도지역별 용적", url: "http://easylaw.go.kr/CSP/CnpClsMain.laf?popMenu=ov&csmSeq=298&ccfNo=3&cciNo=1&cnpClsNo=2", desc: "찾기쉬운 생활법령정보" }
                ]
            }
        ];

        // 2. DOM Elements
        const folderView = document.getElementById('folderView');
        const searchView = document.getElementById('searchView');
        const searchResults = document.getElementById('searchResults');
        const searchInput = document.getElementById('searchInput');
        const clearSearchBtn = document.getElementById('clearSearchBtn');
        const searchCount = document.getElementById('searchCount');
        const noResults = document.getElementById('noResults');

        // Fetch Favicon
        const getFavicon = (url) => {
            try {
                const domain = new URL(url).hostname;
                return `https://www.google.com/s2/favicons?domain=${domain}&sz=64`;
            } catch (e) {
                return 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text y=".9em" font-size="90">🌐</text></svg>';
            }
        };

        // 3. Create Card HTML
        const createCardHTML = (link) => {
            return `
                <a href="${link.url}" target="_blank" rel="noopener noreferrer" 
                   class="bookmark-card group block bg-white border border-gray-200 rounded-xl p-4 h-full relative overflow-hidden">
                    <div class="flex items-start gap-4">
                        <img src="${getFavicon(link.url)}" alt="${link.title} icon" class="w-10 h-10 rounded-md bg-gray-50 p-1 flex-shrink-0 border border-gray-100 object-contain">
                        <div class="flex-grow min-w-0">
                            <h3 class="text-base font-bold text-gray-900 truncate pr-6 group-hover:text-blue-600 transition-colors">${link.title}</h3>
                            <p class="text-sm text-gray-500 mt-1 line-clamp-2 leading-relaxed">${link.desc || 'No description available'}</p>
                            <p class="text-xs text-gray-400 mt-2 truncate">${link.url.replace(/^https?:\/\//, '')}</p>
                        </div>
                    </div>
                    <!-- Hover Arrow Icon -->
                    <div class="absolute top-4 right-4 text-gray-300 opacity-0 group-hover:opacity-100 transition-opacity">
                        <i class="fa-solid fa-arrow-up-right-from-square text-sm"></i>
                    </div>
                </a>
            `;
        };

        // 4. Render Folders
        const renderFolders = () => {
            folderView.innerHTML = '';
            bookmarkData.forEach(category => {
                const section = document.createElement('section');
                section.className = "bg-gray-50/50 rounded-2xl p-6 border border-gray-200/60 shadow-sm";
                
                // Category Header
                const header = document.createElement('div');
                header.className = "flex items-center gap-2 mb-4";
                header.innerHTML = `
                    <div class="bg-blue-100 text-blue-600 w-8 h-8 rounded-lg flex items-center justify-center">
                        <i class="fa-solid ${category.icon}"></i>
                    </div>
                    <h2 class="text-xl font-bold text-gray-800">${category.category}</h2>
                    <span class="ml-2 bg-gray-200 text-gray-600 text-xs py-1 px-2 rounded-full font-medium">${category.links.length}</span>
                `;
                
                // Category Grid
                const grid = document.createElement('div');
                grid.className = "grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4";
                
                category.links.forEach(link => {
                    grid.innerHTML += createCardHTML(link);
                });

                section.appendChild(header);
                section.appendChild(grid);
                folderView.appendChild(section);
            });
        };

        // 5. Search Logic
        const handleSearch = (e) => {
            const query = e.target.value.toLowerCase().trim();

            if (query === '') {
                // Show Folders if query is empty
                folderView.classList.remove('hidden');
                searchView.classList.add('hidden');
                clearSearchBtn.classList.add('hidden');
            } else {
                // Show Search Results
                folderView.classList.add('hidden');
                searchView.classList.remove('hidden');
                clearSearchBtn.classList.remove('hidden');
                
                let results = [];
                // Search across all categories
                bookmarkData.forEach(cat => {
                    cat.links.forEach(link => {
                        if (
                            link.title.toLowerCase().includes(query) ||
                            (link.desc && link.desc.toLowerCase().includes(query)) ||
                            link.url.toLowerCase().includes(query)
                        ) {
                            results.push(link);
                        }
                    });
                });

                // Render Search Results
                searchResults.innerHTML = '';
                searchCount.textContent = results.length;

                if (results.length > 0) {
                    noResults.classList.add('hidden');
                    searchResults.classList.remove('hidden');
                    results.forEach(link => {
                        searchResults.innerHTML += createCardHTML(link);
                    });
                } else {
                    searchResults.classList.add('hidden');
                    noResults.classList.remove('hidden');
                }
            }
        };

        // Event Listeners
        searchInput.addEventListener('input', handleSearch);
        
        clearSearchBtn.addEventListener('click', () => {
            searchInput.value = '';
            // Trigger input event manually
            searchInput.dispatchEvent(new Event('input'));
            searchInput.focus();
        });

        // Initial Render
        renderFolders();

    </script>
</body>
</html>
