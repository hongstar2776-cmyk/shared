<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>호실별 내부마감 물량 산출</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- React & ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  
  <!-- Babel -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  
  <!-- SheetJS (Excel Export) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

  <style>
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif; }
    /* Custom Scrollbar */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
    ::-webkit-scrollbar-track { background: transparent; }
  </style>
</head>
<body class="bg-slate-100 min-h-screen">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useMemo } = React;

    // --- Icons ---
    const PlusIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>;
    const TrashIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>;
    const EditIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>;
    const CopyIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path></svg>;
    const DownloadIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>;
    const UploadIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>;
    const XIcon = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>;

    const App = () => {
      // Data State
      const [records, setRecords] = useState([]);
      const [editId, setEditId] = useState(null);
      const [activeTab, setActiveTab] = useState('list'); // list, summary

      // Modal State
      const [modalConfig, setModalConfig] = useState({ isOpen: false, type: null, data: null });

      // Form State
      const [roomName, setRoomName] = useState('');
      const [shape, setShape] = useState('rectangle'); // rectangle, triangle, custom
      const [dim, setDim] = useState({ w: '', d: '', h: '', p: '', a: '' });
      
      // Deduction State (개구부 공제)
      const defaultDeductions = [];
      const [deductions, setDeductions] = useState(defaultDeductions);

      const defaultFinishes = {
        floor: [{ item: '', spec: '' }],
        ceiling: [{ item: '', spec: '' }],
        wall: [{ item: '', spec: '' }],
        baseboard: [{ item: '', spec: '' }]
      };
      const [finishes, setFinishes] = useState(defaultFinishes);

      // Add/Remove Finish Row
      const addFinishRow = (category) => {
        setFinishes(prev => ({
          ...prev,
          [category]: [...prev[category], { item: '', spec: '' }]
        }));
      };

      const removeFinishRow = (category, index) => {
        if(finishes[category].length === 1) return; // At least one row required
        setFinishes(prev => ({
          ...prev,
          [category]: prev[category].filter((_, i) => i !== index)
        }));
      };

      const updateFinish = (category, index, field, value) => {
        setFinishes(prev => {
          const newArr = [...prev[category]];
          newArr[index][field] = value;
          return { ...prev, [category]: newArr };
        });
      };

      const handleDimChange = (e) => {
        setDim({ ...dim, [e.target.name]: e.target.value });
      };

      // Deduction Handlers
      const addDeduction = () => setDeductions([...deductions, { name: '', type: 'door', w: '', h: '', qty: 1 }]);
      const removeDeduction = (index) => setDeductions(deductions.filter((_, i) => i !== index));
      const updateDeduction = (index, field, value) => {
        const newArr = [...deductions];
        newArr[index][field] = value;
        setDeductions(newArr);
      };

      // JSON 데이터 업로드(복구)
      const importFromJSON = (e) => {
        const file = e.target.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (evt) => {
          try {
            const data = JSON.parse(evt.target.result);
            if (Array.isArray(data)) {
              setRecords(data);
              alert('데이터를 성공적으로 불러왔습니다.');
            } else {
              alert('유효하지 않은 파일 형식입니다.');
            }
          } catch (err) {
            alert('파일을 읽는 중 오류가 발생했습니다.');
          }
          e.target.value = null; // 초기화
        };
        reader.readAsText(file);
      };

      const resetForm = () => {
        setRoomName('');
        setDim({ w: '', d: '', h: '', p: '', a: '' });
        setDeductions(defaultDeductions);
        setFinishes(defaultFinishes);
        setEditId(null);
      };

      // Detailed Calculation Logic (Returns quantity and formula string)
      const getCalcDetails = (targetShape, targetDim, targetDeductions = []) => {
        const w = parseFloat(targetDim.w) || 0;
        const d = parseFloat(targetDim.d) || 0;
        const h = parseFloat(targetDim.h) || 0;
        const p = parseFloat(targetDim.p) || 0;
        const a = parseFloat(targetDim.a) || 0;

        const wm = w / 1000;
        const dm = d / 1000;
        const hm = h / 1000;
        const pm = p / 1000;

        let res = {
          floor: { qty: 0, formula: '' },
          ceiling: { qty: 0, formula: '' },
          wall: { qty: 0, formula: '' },
          baseboard: { qty: 0, formula: '' }
        };

        if (targetShape === 'rectangle') {
          res.floor = { qty: wm * dm, formula: `${wm} × ${dm}` };
          res.ceiling = { qty: wm * dm, formula: `${wm} × ${dm}` };
          res.wall = { qty: (wm + dm) * 2 * hm, formula: `(${wm} + ${dm}) × 2 × ${hm}` };
          res.baseboard = { qty: (wm + dm) * 2, formula: `(${wm} + ${dm}) × 2` };
        } else if (targetShape === 'triangle') {
          res.floor = { qty: (wm * dm) / 2, formula: `(${wm} × ${dm}) ÷ 2` };
          res.ceiling = { qty: (wm * dm) / 2, formula: `(${wm} × ${dm}) ÷ 2` };
          const diag = Math.sqrt(Math.pow(wm, 2) + Math.pow(dm, 2));
          const perimeter = wm + dm + diag;
          res.wall = { qty: perimeter * hm, formula: `(${wm} + ${dm} + ${diag.toFixed(3)}) × ${hm}` };
          res.baseboard = { qty: perimeter, formula: `${wm} + ${dm} + ${diag.toFixed(3)}` };
        } else if (targetShape === 'custom') {
          res.floor = { qty: a, formula: `${a}` };
          res.ceiling = { qty: a, formula: `${a}` };
          res.wall = { qty: pm * hm, formula: `${pm} × ${hm}` };
          res.baseboard = { qty: pm, formula: `${pm}` };
        }

        let wallDeductQty = 0;
        let wallDeductFormula = '';
        let baseDeductQty = 0;
        let baseDeductFormula = '';

        targetDeductions.forEach(ded => {
          const dw = parseFloat(ded.w) || 0;
          const dh = parseFloat(ded.h) || 0;
          const dqty = parseFloat(ded.qty) || 1;
          const dwm = dw / 1000;
          const dhm = dh / 1000;

          const wArea = dwm * dhm * dqty;
          if (wArea > 0) {
            wallDeductQty += wArea;
            wallDeductFormula += ` - [${ded.name}: ${dwm}×${dhm}×${dqty}개]`;
          }

          if (ded.type === 'door') {
            const bLen = dwm * dqty;
            if (bLen > 0) {
              baseDeductQty += bLen;
              baseDeductFormula += ` - [${ded.name}: ${dwm}×${dqty}개]`;
            }
          }
        });

        if (wallDeductQty > 0) {
          res.wall.qty = Math.max(0, res.wall.qty - wallDeductQty);
          res.wall.formula += wallDeductFormula;
        }
        if (baseDeductQty > 0) {
          res.baseboard.qty = Math.max(0, res.baseboard.qty - baseDeductQty);
          res.baseboard.formula += baseDeductFormula;
        }

        return res;
      };

      // Calculate logic (for preview and saving)
      const calculateQuantities = () => {
        const details = getCalcDetails(shape, dim, deductions);
        return {
          floor: details.floor.qty,
          ceiling: details.ceiling.qty,
          wall: details.wall.qty,
          baseboard: details.baseboard.qty
        };
      };

      // Save Record
      const handleSave = () => {
        if (!roomName.trim()) {
          alert('호실명을 입력해주세요.');
          return;
        }

        const quantities = calculateQuantities();
        const newRecord = {
          id: editId || Date.now().toString(),
          roomName,
          shape,
          dim,
          deductions,
          finishes,
          quantities
        };

        if (editId) {
          setRecords(records.map(r => r.id === editId ? newRecord : r));
        } else {
          setRecords([...records, newRecord]);
        }
        resetForm();
      };

      const handleEdit = (record) => {
        setEditId(record.id);
        setRoomName(record.roomName);
        setShape(record.shape);
        setDim(record.dim);
        setDeductions(record.deductions || []);
        setFinishes(record.finishes);
      };

      const handleDelete = (id) => {
        if(confirm('이 호실의 데이터를 삭제하시겠습니까?')) {
          setRecords(records.filter(r => r.id !== id));
          if(editId === id) resetForm();
        }
      };

      // Duplicate Record
      const handleDuplicate = (record) => {
        const duplicatedRecord = JSON.parse(JSON.stringify(record)); // Deep copy
        duplicatedRecord.id = Date.now().toString();
        duplicatedRecord.roomName = record.roomName + ' (복사본)';
        setRecords([...records, duplicatedRecord]);
      };

      // Auto-complete data collection
      const { uniqueItems, uniqueSpecs } = useMemo(() => {
        const items = new Set();
        const specs = new Set();
        records.forEach(r => {
          Object.values(r.finishes).forEach(catArray => {
            catArray.forEach(f => {
              if (f.item && f.item.trim()) items.add(f.item.trim());
              if (f.spec && f.spec.trim()) specs.add(f.spec.trim());
            });
          });
        });
        return { uniqueItems: Array.from(items), uniqueSpecs: Array.from(specs) };
      }, [records]);

      // Flatten data for exporting & summary
      const getFlattenedData = () => {
        const data = [];
        const categoryNames = { floor: '바닥마감', ceiling: '천장마감', wall: '벽체마감', baseboard: '걸레받이' };
        const categoryUnits = { floor: 'M2', ceiling: 'M2', wall: 'M2', baseboard: 'M' };
        const shapeNames = { rectangle: '사각형', triangle: '삼각형', custom: '사용자지정' };

        records.forEach(r => {
          const calcDetails = getCalcDetails(r.shape, r.dim, r.deductions || []);
          
          Object.keys(r.finishes).forEach(cat => {
            r.finishes[cat].forEach(f => {
              if (f.item.trim() || f.spec.trim()) {
                data.push({
                  roomName: r.roomName,
                  shape: shapeNames[r.shape],
                  category: categoryNames[cat],
                  item: f.item,
                  spec: f.spec,
                  qty: r.quantities[cat] !== undefined ? r.quantities[cat] : calcDetails[cat].qty,
                  formula: calcDetails[cat].formula,
                  unit: categoryUnits[cat]
                });
              }
            });
          });
        });
        return data;
      };

      // Summary Logic
      const getSummaryData = () => {
        const flatData = getFlattenedData();
        const summary = {};

        flatData.forEach(row => {
          const key = `${row.category}_${row.item}_${row.spec}`;
          if (!summary[key]) {
            summary[key] = { category: row.category, item: row.item, spec: row.spec, total: 0, unit: row.unit, details: [] };
          }
          summary[key].total += row.qty;
          summary[key].details.push({ roomName: row.roomName, qty: row.qty, formula: row.formula });
        });

        return Object.values(summary);
      };

      // Exports
      const exportToExcel = () => {
        const flatData = getFlattenedData().map(row => ({
          "호실명": row.roomName,
          "타입": row.shape,
          "구분": row.category,
          "품목": row.item,
          "규격": row.spec,
          "산출수량": Number(row.qty.toFixed(3)),
          "단위": row.unit,
          "산출식": row.formula
        }));

        const summaryData = getSummaryData().map(row => ({
          "구분": row.category,
          "품목": row.item,
          "규격": row.spec,
          "총수량": Number(row.total.toFixed(3)),
          "단위": row.unit,
          "산출근거": row.details.map(d => `[${d.roomName}] ${Number(d.qty.toFixed(3))}${row.unit} = ${d.formula}`).join('\n')
        }));

        const wb = XLSX.utils.book_new();
        const ws1 = XLSX.utils.json_to_sheet(flatData);
        const ws2 = XLSX.utils.json_to_sheet(summaryData);

        // 컬럼 너비 조정
        ws1['!cols'] = [{wch: 15}, {wch: 10}, {wch: 12}, {wch: 20}, {wch: 15}, {wch: 10}, {wch: 8}, {wch: 40}];
        ws2['!cols'] = [{wch: 12}, {wch: 20}, {wch: 15}, {wch: 12}, {wch: 8}, {wch: 60}];

        XLSX.utils.book_append_sheet(wb, ws1, "호실별_산출내역");
        XLSX.utils.book_append_sheet(wb, ws2, "품목별_집계");

        XLSX.writeFile(wb, "내부마감_물량산출.xlsx");
      };

      const exportToJSON = () => {
        const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(records, null, 2));
        const downloadAnchorNode = document.createElement('a');
        downloadAnchorNode.setAttribute("href", dataStr);
        downloadAnchorNode.setAttribute("download", "내부마감_물량산출.json");
        document.body.appendChild(downloadAnchorNode);
        downloadAnchorNode.click();
        downloadAnchorNode.remove();
      };

      const renderFinishInputs = (category, label, isArea = true) => {
        return (
          <div className="mb-4 bg-white p-3 rounded-lg border border-slate-200">
            <div className="flex justify-between items-center mb-2">
              <span className="font-semibold text-slate-700 text-sm">{label} <span className="text-xs text-slate-400 font-normal ml-1">({isArea ? 'M2' : 'M'})</span></span>
              <button onClick={() => addFinishRow(category)} className="text-blue-600 hover:text-blue-800 text-xs flex items-center bg-blue-50 px-2 py-1 rounded">
                <PlusIcon /> <span className="ml-1">추가</span>
              </button>
            </div>
            {finishes[category].map((f, i) => (
              <div key={i} className="flex gap-2 mb-2 items-center">
                <input type="text" list="item-list" placeholder="품목 (예: 포세린타일)" value={f.item} onChange={(e) => updateFinish(category, i, 'item', e.target.value)} className="w-1/2 p-2 border rounded text-sm outline-none focus:border-blue-500" />
                <input type="text" list="spec-list" placeholder="규격 (예: 600x600)" value={f.spec} onChange={(e) => updateFinish(category, i, 'spec', e.target.value)} className="w-1/2 p-2 border rounded text-sm outline-none focus:border-blue-500" />
                <button onClick={() => removeFinishRow(category, i)} disabled={finishes[category].length === 1} className="text-red-500 disabled:opacity-30 p-1 hover:bg-red-50 rounded">
                  <TrashIcon />
                </button>
              </div>
            ))}
          </div>
        );
      };

      // Current live calculation for preview
      const currentQties = calculateQuantities();

      return (
        <div className="max-w-7xl mx-auto p-4 flex flex-col md:flex-row gap-6">
          
          {/* Left Panel: Input Form */}
          <div className="w-full md:w-1/3 flex flex-col gap-4">
            <div className="bg-white rounded-xl shadow-sm border border-slate-200 p-5">
              <div className="flex justify-between items-center mb-4">
                <h2 className="text-lg font-bold text-slate-800">{editId ? '호실 정보 수정' : '새 호실 입력'}</h2>
                {editId && <button onClick={resetForm} className="text-xs text-gray-500 underline">입력취소</button>}
              </div>

              {/* 기본 정보 */}
              <div className="space-y-4 mb-6">
                <div>
                  <label className="block text-sm font-medium text-slate-700 mb-1">호실명</label>
                  <input type="text" value={roomName} onChange={e => setRoomName(e.target.value)} placeholder="예: 101호" className="w-full p-2 border rounded focus:ring-2 focus:ring-blue-500 outline-none" />
                </div>
                <div>
                  <label className="block text-sm font-medium text-slate-700 mb-1">바닥 타입</label>
                  <select value={shape} onChange={e => setShape(e.target.value)} className="w-full p-2 border rounded bg-white focus:ring-2 focus:ring-blue-500 outline-none">
                    <option value="rectangle">사각형 (가로/세로)</option>
                    <option value="triangle">삼각형 (밑변/높이)</option>
                    <option value="custom">사용자지정 (둘레/면적)</option>
                  </select>
                </div>
              </div>

              {/* 치수 입력 */}
              <div className="mb-6 p-4 bg-slate-50 rounded-lg border border-slate-100">
                <h3 className="text-sm font-bold text-slate-700 mb-3">치수 입력</h3>
                <div className="grid grid-cols-2 gap-3">
                  {shape === 'rectangle' && (
                    <>
                      <div>
                        <label className="block text-xs text-slate-500 mb-1">가로 (mm)</label>
                        <input type="number" name="w" value={dim.w} onChange={handleDimChange} className="w-full p-2 border rounded text-sm outline-none focus:border-blue-500" />
                      </div>
                      <div>
                        <label className="block text-xs text-slate-500 mb-1">세로 (mm)</label>
                        <input type="number" name="d" value={dim.d} onChange={handleDimChange} className="w-full p-2 border rounded text-sm outline-none focus:border-blue-500" />
                      </div>
                    </>
                  )}
                  {shape === 'triangle' && (
                    <>
                      <div>
                        <label className="block text-xs text-slate-500 mb-1">밑변 (mm)</label>
                        <input type="number" name="w" value={dim.w} onChange={handleDimChange} className="w-full p-2 border rounded text-sm outline-none focus:border-blue-500" />
                      </div>
                      <div>
                        <label className="block text-xs text-slate-500 mb-1">높이 (mm)</label>
                        <input type="number" name="d" value={dim.d} onChange={handleDimChange} className="w-full p-2 border rounded text-sm outline-none focus:border-blue-500" />
                      </div>
                    </>
                  )}
                  {shape === 'custom' && (
                    <>
                      <div>
                        <label className="block text-xs text-slate-500 mb-1">바닥 둘레 (mm)</label>
                        <input type="number" name="p" value={dim.p} onChange={handleDimChange} className="w-full p-2 border rounded text-sm outline-none focus:border-blue-500" />
                      </div>
                      <div>
                        <label className="block text-xs text-slate-500 mb-1">바닥 면적 (M²)</label>
                        <input type="number" name="a" value={dim.a} onChange={handleDimChange} className="w-full p-2 border rounded text-sm outline-none focus:border-blue-500" />
                      </div>
                    </>
                  )}
                  <div className={shape === 'custom' ? 'col-span-2' : ''}>
                    <label className="block text-xs text-slate-500 mb-1">층고 (mm)</label>
                    <input type="number" name="h" value={dim.h} onChange={handleDimChange} className="w-full p-2 border rounded text-sm outline-none focus:border-blue-500" />
                  </div>
                </div>
                
                {/* 실시간 면적 미리보기 */}
                <div className="mt-3 pt-3 border-t border-slate-200 grid grid-cols-4 gap-2 text-center">
                  <div><p className="text-[10px] text-slate-400">바닥</p><p className="text-xs font-semibold text-blue-600">{currentQties.floor.toFixed(2)}</p></div>
                  <div><p className="text-[10px] text-slate-400">천장</p><p className="text-xs font-semibold text-blue-600">{currentQties.ceiling.toFixed(2)}</p></div>
                  <div><p className="text-[10px] text-slate-400">벽체</p><p className="text-xs font-semibold text-blue-600">{currentQties.wall.toFixed(2)}</p></div>
                  <div><p className="text-[10px] text-slate-400">걸레받이</p><p className="text-xs font-semibold text-blue-600">{currentQties.baseboard.toFixed(2)}</p></div>
                </div>
              </div>

              {/* 개구부 공제 입력 (2줄 구성으로 변경) */}
              <div className="mb-6 p-4 bg-white rounded-lg border border-slate-200 shadow-sm">
                <div className="flex justify-between items-center mb-3">
                  <h3 className="text-sm font-bold text-slate-700">개구부 공제 (창호, 문 등)</h3>
                  <button onClick={addDeduction} className="text-blue-600 hover:text-blue-800 text-xs flex items-center bg-blue-50 px-2 py-1 rounded">
                    <PlusIcon /> <span className="ml-1">추가</span>
                  </button>
                </div>
                {deductions.map((ded, i) => (
                  <div key={i} className="mb-3 bg-slate-50 p-3 rounded-lg border border-slate-200 shadow-sm">
                    {/* 첫 번째 줄: 종류, 명칭, 삭제 */}
                    <div className="flex gap-2 mb-2 items-center">
                      <select value={ded.type} onChange={(e) => updateDeduction(i, 'type', e.target.value)} className="w-1/2 p-2 border rounded text-sm outline-none focus:border-blue-500 bg-white">
                        <option value="door">문 (걸레받이 공제 O)</option>
                        <option value="window">창 (걸레받이 공제 X)</option>
                      </select>
                      <input type="text" placeholder="명칭 (예: 방문)" value={ded.name} onChange={(e) => updateDeduction(i, 'name', e.target.value)} className="w-1/2 p-2 border rounded text-sm outline-none focus:border-blue-500" />
                      <button onClick={() => removeDeduction(i)} className="text-red-500 p-1.5 hover:bg-red-100 rounded ml-1 transition-colors">
                        <TrashIcon />
                      </button>
                    </div>
                    {/* 두 번째 줄: 가로, 세로, 수량 */}
                    <div className="flex gap-2 items-center">
                      <div className="w-1/3 relative">
                         <span className="absolute text-[10px] text-slate-500 top-[-8px] left-2 bg-slate-50 px-1">가로(W)</span>
                         <input type="number" placeholder="mm" value={ded.w} onChange={(e) => updateDeduction(i, 'w', e.target.value)} className="w-full p-2 border rounded text-sm outline-none focus:border-blue-500" />
                      </div>
                      <div className="w-1/3 relative">
                         <span className="absolute text-[10px] text-slate-500 top-[-8px] left-2 bg-slate-50 px-1">세로(H)</span>
                         <input type="number" placeholder="mm" value={ded.h} onChange={(e) => updateDeduction(i, 'h', e.target.value)} className="w-full p-2 border rounded text-sm outline-none focus:border-blue-500" />
                      </div>
                      <div className="w-1/3 relative">
                         <span className="absolute text-[10px] text-slate-500 top-[-8px] left-2 bg-slate-50 px-1">수량</span>
                         <input type="number" placeholder="개" value={ded.qty} onChange={(e) => updateDeduction(i, 'qty', e.target.value)} className="w-full p-2 border rounded text-sm outline-none focus:border-blue-500" />
                      </div>
                    </div>
                  </div>
                ))}
                {deductions.length === 0 && (
                  <p className="text-xs text-slate-400 text-center py-2">추가 버튼을 눌러 공제 항목을 입력하세요.</p>
                )}
              </div>

              {/* 마감재 입력 */}
              <div className="mb-6">
                <h3 className="text-sm font-bold text-slate-700 mb-3">마감재 품목/규격 (다중 입력 가능)</h3>
                {renderFinishInputs('floor', '바닥 마감', true)}
                {renderFinishInputs('ceiling', '천장 마감', true)}
                {renderFinishInputs('wall', '벽체 마감', true)}
                {renderFinishInputs('baseboard', '걸레받이', false)}
              </div>

              {/* 자동완성 데이터리스트 */}
              <datalist id="item-list">
                {uniqueItems.map((item, idx) => <option key={idx} value={item} />)}
              </datalist>
              <datalist id="spec-list">
                {uniqueSpecs.map((spec, idx) => <option key={idx} value={spec} />)}
              </datalist>

              <button onClick={handleSave} className="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-4 rounded-lg transition-colors">
                {editId ? '수정된 내용 저장' : '리스트에 추가'}
              </button>
            </div>
          </div>

          {/* Right Panel: Data View */}
          <div className="w-full md:w-2/3 flex flex-col gap-4">
            <div className="bg-white rounded-xl shadow-sm border border-slate-200 flex-1 flex flex-col h-[calc(100vh-2rem)]">
              
              {/* Header & Export */}
              <div className="p-4 border-b border-slate-200 flex justify-between items-center bg-slate-50 rounded-t-xl">
                <div className="flex gap-2 bg-white p-1 rounded-lg border border-slate-200">
                  <button onClick={() => setActiveTab('list')} className={`px-4 py-1.5 text-sm font-medium rounded-md transition-colors ${activeTab === 'list' ? 'bg-slate-800 text-white' : 'text-slate-600 hover:bg-slate-100'}`}>
                    호실별 내역
                  </button>
                  <button onClick={() => setActiveTab('summary')} className={`px-4 py-1.5 text-sm font-medium rounded-md transition-colors ${activeTab === 'summary' ? 'bg-slate-800 text-white' : 'text-slate-600 hover:bg-slate-100'}`}>
                    품목별 집계
                  </button>
                </div>
                <div className="flex gap-2">
                  <label className="flex items-center gap-1.5 px-3 py-1.5 bg-white border border-slate-300 text-slate-700 text-sm font-medium rounded-md hover:bg-slate-50 transition-colors shadow-sm cursor-pointer">
                    <UploadIcon /> JSON 업로드
                    <input type="file" accept=".json" onChange={importFromJSON} className="hidden" />
                  </label>
                  <button onClick={exportToJSON} className="flex items-center gap-1.5 px-3 py-1.5 bg-white border border-slate-300 text-slate-700 text-sm font-medium rounded-md hover:bg-slate-50 transition-colors shadow-sm">
                    <DownloadIcon /> JSON
                  </button>
                  <button onClick={exportToExcel} className="flex items-center gap-1.5 px-3 py-1.5 bg-green-600 text-white text-sm font-medium rounded-md hover:bg-green-700 transition-colors shadow-sm">
                    <DownloadIcon /> Excel
                  </button>
                </div>
              </div>

              {/* Content Area */}
              <div className="flex-1 overflow-auto p-4 bg-slate-50">
                {records.length === 0 ? (
                  <div className="h-full flex flex-col items-center justify-center text-slate-400">
                    <p>좌측 폼에서 호실별 정보를 입력하고 추가해주세요.</p>
                  </div>
                ) : (
                  <>
                    {/* Tab: 호실별 내역 */}
                    {activeTab === 'list' && (
                      <div className="space-y-4">
                        {records.map(record => (
                          <div key={record.id} 
                               onDoubleClick={() => setModalConfig({ isOpen: true, type: 'room', data: record })}
                               className={`bg-white border rounded-xl overflow-hidden shadow-sm cursor-pointer hover:border-blue-400 hover:shadow-md transition-all ${editId === record.id ? 'border-blue-500 ring-1 ring-blue-500' : 'border-slate-200'}`}
                               title="더블클릭하여 산출식 및 상세 보기">
                            <div className="px-4 py-3 border-b border-slate-100 flex justify-between items-center bg-slate-50/50">
                              <div>
                                <span className="font-bold text-lg text-slate-800 mr-2">{record.roomName}</span>
                                <span className="text-[10px] text-blue-500 mr-3 hidden sm:inline-block font-medium bg-blue-50 px-2 py-0.5 rounded-full">(더블클릭하여 산출식 확인)</span>
                                <span className="text-xs bg-slate-200 text-slate-600 px-2 py-1 rounded-full">
                                  {record.shape === 'rectangle' ? '사각형' : record.shape === 'triangle' ? '삼각형' : '사용자지정'}
                                </span>
                                {record.deductions && record.deductions.length > 0 && (
                                  <span className="ml-2 text-[10px] bg-red-100 text-red-600 px-2 py-0.5 rounded-full border border-red-200">개구부 공제 적용됨</span>
                                )}
                              </div>
                              <div className="flex gap-2">
                                <button onClick={() => handleDuplicate(record)} className="p-1.5 text-emerald-600 hover:bg-emerald-50 rounded-md transition-colors" title="호실 복제"><CopyIcon /></button>
                                <button onClick={() => handleEdit(record)} className="p-1.5 text-blue-600 hover:bg-blue-50 rounded-md transition-colors" title="수정"><EditIcon /></button>
                                <button onClick={() => handleDelete(record.id)} className="p-1.5 text-red-600 hover:bg-red-50 rounded-md transition-colors" title="삭제"><TrashIcon /></button>
                              </div>
                            </div>
                            <div className="p-4 grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-4">
                              {['floor', 'ceiling', 'wall', 'baseboard'].map(cat => {
                                const labels = { floor: '바닥', ceiling: '천장', wall: '벽체', baseboard: '걸레받이' };
                                const unit = cat === 'baseboard' ? 'M' : 'M²';
                                const validItems = record.finishes[cat].filter(f => f.item || f.spec);
                                
                                return (
                                  <div key={cat} className="bg-slate-50 rounded-lg p-3 border border-slate-100">
                                    <div className="flex justify-between items-end mb-2 pb-2 border-b border-slate-200">
                                      <span className="text-sm font-semibold text-slate-700">{labels[cat]}</span>
                                      <span className="font-bold text-blue-600">{record.quantities[cat].toFixed(2)} <span className="text-xs text-slate-400 font-normal">{unit}</span></span>
                                    </div>
                                    <ul className="space-y-1">
                                      {validItems.length > 0 ? validItems.map((f, i) => (
                                        <li key={i} className="text-xs text-slate-600 flex items-start">
                                          <span className="text-slate-400 mr-1.5">-</span>
                                          <span>{f.item} <span className="text-slate-400 ml-1">{f.spec}</span></span>
                                        </li>
                                      )) : (
                                        <li className="text-xs text-slate-400 italic">입력된 품목 없음</li>
                                      )}
                                    </ul>
                                  </div>
                                )
                              })}
                            </div>
                          </div>
                        ))}
                      </div>
                    )}

                    {/* Tab: 품목별 집계 */}
                    {activeTab === 'summary' && (
                      <div className="bg-white border border-slate-200 rounded-xl overflow-hidden shadow-sm">
                        <table className="min-w-full divide-y divide-slate-200 text-sm">
                          <thead className="bg-slate-50">
                            <tr>
                              <th className="px-4 py-3 text-left font-semibold text-slate-600">구분</th>
                              <th className="px-4 py-3 text-left font-semibold text-slate-600">품목</th>
                              <th className="px-4 py-3 text-left font-semibold text-slate-600">규격</th>
                              <th className="px-4 py-3 text-right font-semibold text-slate-600">총 수량</th>
                              <th className="px-4 py-3 text-left font-semibold text-slate-600">단위</th>
                            </tr>
                          </thead>
                          <tbody className="bg-white divide-y divide-slate-100">
                            {getSummaryData().length > 0 ? getSummaryData().map((row, i) => (
                              <tr key={i} 
                                  onDoubleClick={() => setModalConfig({ isOpen: true, type: 'item', data: row })}
                                  className="hover:bg-blue-50 cursor-pointer transition-colors"
                                  title="더블클릭하여 호실별 산출근거 상세 보기">
                                <td className="px-4 py-3 whitespace-nowrap text-slate-700 font-medium">{row.category}</td>
                                <td className="px-4 py-3 whitespace-nowrap text-slate-800 flex items-center gap-2">
                                  {row.item || '-'} <span className="text-[10px] text-blue-500 hidden sm:inline-block bg-blue-100 px-1.5 rounded">(더블클릭 팝업)</span>
                                </td>
                                <td className="px-4 py-3 whitespace-nowrap text-slate-500">{row.spec || '-'}</td>
                                <td className="px-4 py-3 whitespace-nowrap text-right font-bold text-blue-600">{row.total.toFixed(3)}</td>
                                <td className="px-4 py-3 whitespace-nowrap text-slate-400">{row.unit}</td>
                              </tr>
                            )) : (
                              <tr>
                                <td colSpan="5" className="px-4 py-8 text-center text-slate-400">집계할 품목 데이터가 없습니다.</td>
                              </tr>
                            )}
                          </tbody>
                        </table>
                      </div>
                    )}
                  </>
                )}
              </div>
            </div>
          </div>
          
          {/* Modal Overlay (팝업 모달) */}
          {modalConfig.isOpen && (
            <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center z-50 p-4" onClick={() => setModalConfig({ isOpen: false, type: null, data: null })}>
              <div className="bg-white rounded-xl shadow-xl w-full max-w-3xl max-h-[85vh] flex flex-col overflow-hidden" onClick={e => e.stopPropagation()}>
                {/* Modal Header */}
                <div className="flex justify-between items-center px-5 py-4 border-b border-slate-200 bg-slate-50">
                  <h2 className="text-lg font-bold text-slate-800 flex items-center gap-2">
                    {modalConfig.type === 'room' ? (
                      <><span className="bg-blue-600 text-white px-2 py-1 rounded text-sm">{modalConfig.data.roomName}</span> 산출 상세내역</>
                    ) : (
                      <><span className="bg-emerald-600 text-white px-2 py-1 rounded text-sm">{modalConfig.data.category}</span> {modalConfig.data.item} {modalConfig.data.spec} 산출 상세내역</>
                    )}
                  </h2>
                  <button onClick={() => setModalConfig({ isOpen: false, type: null, data: null })} className="text-slate-400 hover:text-slate-700 p-1 rounded hover:bg-slate-200 transition-colors">
                    <XIcon />
                  </button>
                </div>

                {/* Modal Body */}
                <div className="p-5 overflow-y-auto bg-white flex-1">
                  
                  {/* Type 1: Room Detail */}
                  {modalConfig.type === 'room' && (
                    <div className="space-y-4">
                      {['floor', 'ceiling', 'wall', 'baseboard'].map(cat => {
                        const labels = { floor: '바닥', ceiling: '천장', wall: '벽체', baseboard: '걸레받이' };
                        const unit = cat === 'baseboard' ? 'M' : 'M²';
                        const calcData = getCalcDetails(modalConfig.data.shape, modalConfig.data.dim, modalConfig.data.deductions || []);
                        const validItems = modalConfig.data.finishes[cat].filter(f => f.item || f.spec);
                        
                        return (
                          <div key={cat} className="bg-slate-50 rounded-lg p-4 border border-slate-200">
                            <div className="flex justify-between items-center mb-2">
                              <h4 className="font-bold text-slate-700">{labels[cat]} <span className="text-xs font-normal text-slate-400 ml-1">({unit})</span></h4>
                              <span className="font-bold text-blue-600 bg-blue-50 px-3 py-1 rounded-full border border-blue-100">{calcData[cat].qty.toFixed(3)} <span className="text-xs text-blue-400">{unit}</span></span>
                            </div>
                            <div className="mb-3 p-3 bg-white border border-slate-200 rounded text-sm text-slate-700 font-mono overflow-x-auto shadow-sm">
                              <span className="text-slate-400 text-xs mr-2 block mb-1">산출식:</span>
                              {calcData[cat].formula || '산출식 없음'}
                            </div>
                            {validItems.length > 0 ? (
                              <div className="text-sm">
                                <span className="text-slate-500 text-xs block mb-1">적용 마감재:</span>
                                <div className="flex flex-wrap gap-2">
                                  {validItems.map((f, i) => (
                                    <span key={i} className="bg-indigo-50 border border-indigo-100 text-indigo-700 px-2 py-1 rounded text-xs font-medium">
                                      {f.item} {f.spec && `(${f.spec})`}
                                    </span>
                                  ))}
                                </div>
                              </div>
                            ) : (
                              <div className="text-xs text-slate-400 italic">적용된 마감재가 없습니다.</div>
                            )}
                          </div>
                        )
                      })}
                    </div>
                  )}

                  {/* Type 2: Item Summary Detail */}
                  {modalConfig.type === 'item' && (
                    <div className="space-y-4">
                      <div className="bg-blue-50 text-blue-800 p-4 rounded-lg flex justify-between items-center font-bold border border-blue-100 shadow-sm">
                        <span>이 품목의 총 물량 합계</span>
                        <span className="text-2xl">{modalConfig.data.total.toFixed(3)} <span className="text-sm font-normal text-blue-600">{modalConfig.data.unit}</span></span>
                      </div>
                      
                      <div className="border border-slate-200 rounded-lg overflow-hidden">
                        <table className="min-w-full text-sm border-collapse">
                          <thead>
                            <tr className="border-b border-slate-200 text-slate-600 bg-slate-100">
                              <th className="py-2.5 px-4 text-left w-1/4 font-semibold">적용 호실</th>
                              <th className="py-2.5 px-4 text-right w-1/4 font-semibold">산출 물량</th>
                              <th className="py-2.5 px-4 text-left w-1/2 font-semibold">산출식 (근거)</th>
                            </tr>
                          </thead>
                          <tbody className="divide-y divide-slate-100">
                            {modalConfig.data.details.map((d, i) => (
                              <tr key={i} className="hover:bg-slate-50 transition-colors">
                                <td className="py-3 px-4 font-bold text-slate-800">{d.roomName}</td>
                                <td className="py-3 px-4 text-right font-bold text-blue-600 whitespace-nowrap">{d.qty.toFixed(3)} <span className="text-xs text-slate-400 font-normal">{modalConfig.data.unit}</span></td>
                                <td className="py-3 px-4 font-mono text-xs text-slate-600 break-all leading-relaxed">{d.formula}</td>
                              </tr>
                            ))}
                          </tbody>
                        </table>
                      </div>
                    </div>
                  )}

                </div>
              </div>
            </div>
          )}

        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
